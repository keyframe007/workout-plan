\n[] In-water stretching: full routine ____\n[] Pool deck stretching: full routine ____\n[] Total session time: ~30 minutes ____\n[] Water intake: 16+ oz post-workout ____\n[] Post-workout meal: protein + carbs ____\n\nBONUS NOTES:\n[] How did sprints feel vs Week 1? MUCH STRONGER!\n[] How's your conditioning? WAY BETTER!\n[] How's your confidence? THROUGH THE ROOF!\n\n================================================================================\nCELEBRATE!\n================================================================================\n\nYOU DID IT!\n\nThis is your FINAL WORKOUT of the 4-week program!\n\nTomorrow (Saturday): Light stretching + celebration\nSunday: REST + reflection\n\nThen NEXT WEEK:\n- Program review & next steps\n- Consider continuing with monthly progressions\n- Set new goals\n- Celebrate your transformation!\n\nYOU'VE EARNED THIS VICTORY!\n\n================================================================================", "day_of_week": "Fri", "date": "Mar07", "workout_type": "Pool Swimming"}, "27": {"filename": "Day_27_Sat_Mar08_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 4\n================================================================================\nDay 27 | Saturday, March 8, 2026 | Rest Day - Active Recovery\n================================================================================\n\nACTIVE RECOVERY DAY\n\nYou crushed Friday's pool workout - final structured session of the program!\nThis is a CELEBRATION rest day with light activity and stretching.\n\nGOAL:\n- Keep moving to promote recovery\n- Celebrate your hard work!\n- Restore flexibility and mobility\n- Prepare mind and body for rest day tomorrow\n- Reflect on your 4-week transformation\n\n================================================================================\nMORNING ROUTINE (5 minutes)\n================================================= ro intensity - this is active recovery!\n\n================================================================================\nSTRETCHING ROUTINE (10-15 minutes)\n================================================================================\n\nFull Body Stretching Sequence:\nHold each stretch 30-45 seconds (longer if it feels good!)\n\nNECK & SHOULDERS (Your priority!):\n1. Gentle chin to chest: 45 seconds\n2. Right ear to right shoulder: 45 seconds\n3. Left ear to left shoulder: 45 seconds\n4. Gentle head rotation right: 30 seconds\n5. Gentle head rotation left: 30 seconds\n6. Cross-body shoulder stretch: 45 seconds each\n7. YouTube: https://www.youtube.com/results?search_query=neck+and+shoulder+stretches+full+routine\n\nUPPER BACK:\n8. Child's pose: 60 seconds\n9. Doorway chest stretch: 60 seconds\n10. Shoulder blade squeezes (hold 2 sec, 15 reps): dynamic\n11. YouTube: https://www.youtube.com/results?search_query=upper+back+stretches+for+flexibility+tutorial\n\nLOWER BODY:\n12. Standing quad stretch: 45 seconds each leg\n13. Standing hamstring stretch: 45 seconds each leg\n14. Standing hip flexor stretch: 45 seconds each side\n15. Standing glute stretch: 45 seconds each side\n16. YouTube: https://www.youtube.com/results?search_query=lower+body+stretches+full+routine+tutorial\n\nSPINAL MOBILITY:\n17. Lying spinal twist: 45 seconds each side\n18. Cat-cow stretches: 10 slow, controlled reps\n19. YouTube: https://www.youtube.com/results?search_query=spinal+mobility+stretches+tutorial\n\nCORE/FLOOR WORK:\n20. Knees to chest: 45 seconds\n21. Happy baby pose: 45 seconds\n22. YouTube: https://www.youtube.com/results?search_query=floor+stretches+core+stability+tutorial\n\nTOTAL: ~15 minutes of full body flexibility work\n\n================================================================================\nMIDDAY - REFLECTION & JOURNALING\n================================================================================\n\nNOW IS THE TIME TO CELEBRATE AND REFLECT!\n\nTake 10-15 minutes to think about and WRITE DOWN:\n\nYOUR TRANSFORMATION (Week 1 -> Week 4):\n\nStrength Gains:\n- Week 1: What was your heaviest lift? _________________\n- Week 4: You now use 25lb kettlebells and 15-20lb dumbbells!\n- Progression: That's STRONG progress!\n\nEnergy Levels:\n- Week 1: How did you feel after workouts? Exhausted? Proud?\n- Week 4: How different does your energy feel now?\n- Notes: ________________________________________\n\nFlexibility:\n- Week 1: Could you touch your toes? Neck stiff?\n- Week 4: Where's your flexibility now?\n- Notes: Probably MUCH better!\n\nConfidence:\n- Week 1: How confident about fitness? 1-10? _____\n- Week 4: What's your confidence level now? _____\n- Increase = SUCCESS!\n\nPhysical Changes You Notice:\n- Clothes fitting differently? ___________\n- Muscles visible where before was soft? ___________\n- Posture improvement? ___________\n- Sleep quality? ___________\n- Mood/mental health? ___________\n\nFITNESS HABITS BUILT:\n- Week 1: How natural did structured workouts feel? Not natural?\n- Week 4: Now it's ROUTINE - 4 weeks of habit building!\n- This is REAL habit change!\n\nHARDEST MOMENT:\n- When did you want to quit? ___________\n- What kept you going? ___________\n- You overcame it! That's MENTAL TOUGHNESS!\n\n================================================================================\nEVENING ROUTINE (10 minutes)\n================================================================================\n\nLIGHT STRETCHING (gentle, relaxing):\n- Repeat your favorite 5-6 stretches from morning\n- Hold longer: 60 seconds each\n- Focus on what feels tight\n- Breathing: Deep, relaxed\n- YouTube: https://www.youtube.com/results?search_query=relaxing+bedtime+stretches+routine\n\nGRATITUDE REFLECTION:\n- List 3 things you're grateful for about THIS WEEK\n- Example: Completed all workouts, feeling stronger, discovered love of swimming\n- Example: Flexibility improved, neck less stiff, built confidence\n- Example: Energy level ================\nMINDSET FOR TOMORROW (FULL REST DAY)\n================================================================================\n\nTOMORROW = CELEBRATION & REST\n\nWhat Sunday Looks Like:\n- NO structured workouts\n- NO time pressure\n- NO performance goals\n- Just REST and REFLECTION\n- Light stretching if you feel like it\n- Enjoy your family, hobbies, relaxation\n- Celebrate your 4-week achievement!\n\nWhat To Reflect On:\n- You started sedentary 4 weeks ago\n- You're now fit, strong, and consistent\n- You proved you can do HARD things\n- You built habits that will last\n\nWhat's Next:\n- Plan for Month 2 (next week)\n- Increased weights? YES\n- More frequency (4 days/week)? Maybe\n- New exercises? Definitely!\n- But first: REST AND CELEBRATE!\n\n================================================================================\nTODAY'S CHECKLIST\n================================================================================\n\n[] Morning light movement: 5 min ____\n[] Main activity chosen: Walk / Yoga / Swim / Cycle ____\n[] Activity completed: 20-30 minutes ____\n[] Stretching routine: full 15 min ____\n[] Reflection/journaling: completed ____\n[] Evening light stretching: 10 min ____\n[] Water intake: 8+ glasses ____\n[] Balanced meals: breakfast, lunch, dinner ____\n[] Neck stretches: daily routine ____\n[] Sleep preparation: started early ____\n\nCELEBRATIONS:\n[] Appreciate your body for 4 weeks of hard work!\n[] Acknowledge your mental toughness!\n[] Recognize your habit building!\n[] Feel PROUD!\n\n================================================================================\nFINAL THOUGHTS\n================================================================================\n\nYOU'VE COMPLETED WEEK 4!\n\nIn 7 days you've accomplished:\n- Full body gym session (with NEW dumbbell progressions!)\n- 2 full stretching/mobility days\n- Kettlebell + bands home workout (with NEW Pallof Press!)\n- Pool/swimming with intervals and sprints!\n- Built strength, lost fat, improved mobility\n- Created a foundation for lifetime fitness\n\nStarting Point (4 weeks ago):\n- Sedentary lifestyle\n- Limited strength\n- Stiff neck from sitting\n- Low confidence in fitness\n\nNOW:\n- 3 workouts/week COMPLETED\n- 25lb kettlebells lifting\n- Flexible, mobile, strong neck\n- HIGH confidence in your abilities\n- REAL fitness habits\n\nTOMORROW:\n- Full rest, reflection, celebration\n- Then NEXT WEEK: plan Month 2\n- Progressions, new exercises, increased challenge!\n\nYOU'VE GOT THIS!\nRest well tonight - YOU'VE EARNED IT!\n\n================================================================================", "day_of_week": "Sat", "date": "Mar08", "workout_type": "Stretching Mobility"}, "28": {"filename": "Day_28_Sun_Mar09_Rest.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 4\n================================================================================\nDay 28 | Sunday, March 9, 2026 | FULL REST & CELEBRATION DAY\n================================================================================\n\nCONGRATULATIONS!!!\n\nYOU HAVE COMPLETED THE FULL 4-WEEK FOUNDATION PROGRAM!\n\nThis is an ENORMOUS achievement. Take a moment to really appreciate what you've done.\n\n4 weeks ago, you were sedentary. Today, you're:\n✓ Strong (25lb kettlebells!)\n✓ Fit (completing interval workouts!)\n✓ Flexible (dramatic improvement in mobility!)\n✓ Consistent (12 structured workouts completed!)\n✓ Confident (transformed your relationship with fitness!)\n\nTHIS IS REAL SUCCESS!\n\n================================================================================\nTODAY'S ACTIVITY\n================================================================================\n\nFULL REST & CELEBRATION DAY\n\nToday has ZERO obligations:\n\nNo Structured Workouts:\n- No gym session\n- No kettlebell workout\n- No swimming intervals\n- No time pressure\n\nWhat You CAN Do:\n- Light stretching (optional, whenever you want)\n- Easy walk if you feel like it (for fun, not exercise)\n- Enjoy time with family\n- Pursue hobbies and interests\n- Relax, recover, celebrate!\n\nThe Only \"Requirement\":\n- Light stretching routine if desired (see below)\n- Reflect on your 4-week journey\n- Plan for Month 2\n- CELEBRATE!\n\n================================================================================\nOPTIONAL LIGHT STRETCHING (5-10 minutes)\n================================================================================\n\nIf you want to stretch (optional!):\n\nQuick Stretching Routine:\n- Neck stretches: 30 seconds each direction\n- Shoulder stretches: 30 seconds each side\n- Hamstring stretches: 30 seconds each leg\n- Quad stretches: 30 seconds each leg\n- Spinal twist: 30 seconds each side\n- YouTube: https://www.youtube.com/results?search_query=gentle+stretching+routine+5+minutes\n\nThis is OPTIONAL - do only if you want to!\n\n================================================================================\nYOUR TRANSFORMATION SUMMARY\n================================================================================\n\nWEEK 1 -> WEEK 4 PROGRESS:\n\nSTRENGTH PROGRESSION:\n- Week 1: Kettlebell 15lb, machines, bodyweight\n- Week 4: Kettlebell 25lb, dumbbells 15-20lb, same bodyweight\n- Progress: +67% kettlebell strength!\n\nVOLUME PROGRESSION:\n- Week 1: 2 sets per exercise, 10-12 reps, rest 60-90 sec\n- Week 4: 3 sets per exercise, 12-15 reps, rest 45-60 sec\n- Progress: More volume, shorter rest = better conditioning!\n\nEXERCISE PROGRESSION:\n- Week 1: Machines, kettlebells, basic movements\n- Week 4: Free weights (dumbbells), new exercises (Pallof Press), advanced conditioning\n- Progress: Real skill development!\n\nCONDITIONING PROGRESSION:\n- Week 1: Easy 10-15 min swimming, 2 sets of low reps\n- Week 4: 30 min swim with intervals + sprints, circuit training, kettlebell work\n- Progress: 2X the conditioning capacity!\n\nNEW EXERCISE MASTERY:\n- Dumbbell Bench Press (learned proper free weight form!)\n- Dumbbell Shoulder Press (built pressing strength!)\n- Band Pallof Press (developed anti-rotation core strength!)\n- Sprint swimming (built speed and power!)\n\nMOBILITY & FLEXIBILITY IMPROVEMENTS:\n- Neck: Dramatically improved range of motion!\n- Shoulders: More mobile, less tight\n- Hips: Better depth in squats, improved flexibility\n- Spine: Increased mobility from consistent stretching\n- Full Body: Noticeable increase in flexibility from Day 1\n\nCONSISTENCY ACHIEVEMENT:\n- 12 structured workouts completed (100% compliance!)\n- 4 full stretching/mobility days (excellent dedication!)\n- 2 active recovery days (smart training!)\n- 10 rest days (proper recovery management!)\n- TOTAL: 28 days of structured planning and execution\n\nYOU BUILT A HABIT!\n- Started sedentary\n- Now: Exercise 3x/week is NORMAL for you\n- Stretching daily is part of your routine\n- This habit will last if you continue!\n\n================================================================================\nREFLECTION TIME - YOUR WINS\n================================================================================\n\nTake 20 minutes and honestly reflect on these questions:\n\nPHYSICAL CHANGES:\n1. How do your clothes fit now vs 4 weeks ago?\n   - Tighter in some areas (muscle!)\n   - Looser in others (fat loss!)\n   - How confident do you feel in your body?\n\n2. How's your energy throughout the day?\n   - More? Less? Same?\n   - Sleeping better?\n   - Recovery faster?\n\n3. Can you DO things now you couldn't before?\n   - Lifting 25lb kettlebells?\n   - Completing 30 min pool workouts?\n   - Better posture?\n   - Neck pain decreased?\n\n4. What surprised you most about this month?\n   - How strong you got?\n   - How much you enjoyed swimming?\n   - How much your neck improved?\n   - Your mental toughness?\n\nMENTAL & EMOTIONAL CHANGES:\n1. How's your confidence level?\n   - Week 1: 1-10? ___\n   - Week 4: 1-10? ___\n   - Increa         // === Progress Tracking ===
        const PROGRESS_KEY = 'workout-progress';

        function loadProgress() {
            try {
                const data = localStorage.getItem(PROGRESS_KEY);
                return data ? JSON.parse(data) : {};
            } catch (e) {
                return {};
            }
        }

        function saveProgress(progress) {
            try {
                localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
            } catch (e) {}
        }

        function toggleExercise(exerciseId) {
            const progress = loadProgress();
            if (progress[exerciseId]) {
                delete progress[exerciseId];
            } else {
                progress[exerciseId] = true;
            }
            saveProgress(progress);
            updateExerciseUI(exerciseId);
            updateAllProgressBars();
            if (document.getElementById('progress').classList.contains('active')) {
                renderProgressPage();
            }
        }

        function updateExerciseUI(exerciseId) {
            const progress = loadProgress();
            const btn = document.querySelector(`[data-exercise-id="${exerciseId}"]`);
            const exerciseDiv = btn ? btn.closest('.exercise') : null;

            if (btn) {
                if (progress[exerciseId]) {
                    btn.classList.add('completed');
                    btn.textContent = '✓ Done';
                    if (exerciseDiv) exerciseDiv.classList.add('completed');
                } else {
                    btn.classList.remove('completed');
                    btn.textContent = 'Complete';
                    if (exerciseDiv) exerciseDiv.classList.remove('completed');
                }
            }
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                localStorage.removeItem(PROGRESS_KEY);
                renderAllWeeks();
                renderProgressPage();
            }
        }

        function countExercisesInDay(weekNum, dayNum) {
            const content = workoutData.weeks[weekNum]?.[dayNum]?.content;
            if (!content) return 0;
            const lines = content.split('\n');
            let count = 0;
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.match(/^Exercise \d+:/i) || trimmed.match(/^\d+\./)) {
                    count++;
                }
            }
            return count;
        }

        function getDayProgress(weekNum, dayNum) {
            const total = countExercisesInDay(weekNum, dayNum);
            const progress = loadProgress();
            let completed = 0;
            for (let i = 0; i < total; i++) {
                if (progress[`week${weekNum}-day${dayNum}-ex${i}`]) {
                    completed++;
                }
            }
            return { total, completed };
        }

        function getWeekProgress(weekNum) {
            const weekData = workoutData.weeks[weekNum];
            if (!weekData) return { total: 0, completed: 0 };
            let total = 0;
            let completed = 0;
            for (const dayNum of Object.keys(weekData)) {
                const dp = getDayProgress(weekNum, parseInt(dayNum));
                total += dp.total;
                completed += dp.completed;
            }
            return { total, completed };
        }

        function getOverallProgress() {
            let total = 0;
            let completed = 0;
            for (let w = 1; w <= 4; w++) {
                const wp = getWeekProgress(w);
                total += wp.total;
                completed += wp.completed;
            }
            return { total, completed };
        }

        function getStreakDays() {
            const progress = loadProgress();
            const daysWithActivity = new Set();
            for (const key of Object.keys(progress)) {
                const match = key.match(/^week(\d+)-day(\d+)-ex\d+$/);
                if (match) {
                    daysWithActivity.add(`${match[1]}-${match[2]}`);
                }
            }
            return daysWithActivity.size;
        }

        function updateAllProgressBars() {
            for (let weekNum = 1; weekNum <= 4; weekNum++) {
                const weekId = `week${weekNum}`;
                const weekData = workoutData.weeks[weekNum];
                if (!weekData) continue;

                for (const dayNum of Object.keys(weekData)) {
                    const dp = getDayProgress(weekNum, parseInt(dayNum));
                    const btn = document.querySelector(`#${weekId} .day-btn[data-day="${dayNum}"] .day-progress`);
                    if (btn) {
                        btn.textContent = dp.total > 0 ? `${dp.completed}/${dp.total}` : '';
                        if (dp.completed === dp.total && dp.total > 0) {
                            btn.classList.add('all-done');
                        } else {
                            btn.classList.remove('all-done');
                        }
                    }
                }
            }
        }

        function renderProgressPage() {
            const overall = getOverallProgress();
            const overallPct = overall.total > 0 ? Math.round((overall.completed / overall.total) * 100) : 0;
            const fillClass = overallPct === 100 ? ' complete' : '';

            let html = `
                <div class="section-title">Your Progress</div>
                <div class="progress-overview">
                    <h2>Overall Program Completion</h2>
                    <div class="big-percentage">${overallPct}%</div>
                    <div class="progress-subtitle">${overall.completed} of ${overall.total} exercises completed</div>
                    <div style="margin-top:20px;">
                        <div class="progress-bar-track" style="background:rgba(255,255,255,0.3);">
                            <div class="progress-bar-fill${fillClass}" style="width:${overallPct}%;background:rgba(255,255,255,0.9);"></div>
                        </div>
                    </div>
                </div>

                <div class="progress-stats">
                    <div class="stat-card">
                        <div class="stat-number">${overall.completed}</div>
                        <div class="stat-label">Exercises Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${overall.total - overall.completed}</div>
                        <div class="stat-label">Exercises Remaining</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${overallPct}%</div>
                        <div class="stat-label">Program Complete</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${getStreakDays()}</div>
                        <div class="stat-label">Days with Activity</div>
                    </div>
                </div>`;

            for (let w = 1; w <= 4; w++) {
                const wp = getWeekProgress(w);
                const wpPct = wp.total > 0 ? Math.round((wp.completed / wp.total) * 100) : 0;
                const weekFillClass = wpPct === 100 ? ' complete' : '';

                html += `
                <div class="week-progress-card">
                    <h3>Week ${w}</h3>
                    <div class="progress-header">
                        <span>${wp.completed} / ${wp.total} exercises</span>
                        <span class="progress-percentage">${wpPct}%</span>
                    </div>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill${weekFillClass}" style="width:${wpPct}%"></div>
                    </div>
                    <div class="day-progress-grid">`;

                const weekData = workoutData.weeks[w];
                const dayNumbers = Object.keys(weekData).map(d => parseInt(d)).sort((a, b) => a - b);
                for (const dayNum of dayNumbers) {
                    const dp = getDayProgress(w, dayNum);
                    let dotClass = 'none';
                    if (dp.completed > 0 && dp.completed < dp.total) dotClass = 'partial';
                    if (dp.completed === dp.total && dp.total > 0) dotClass = 'done';
                    const dayLabel = weekData[dayNum].day_of_week.substring(0, 3);
                    html += `<div class="day-progress-dot ${dotClass}">${dayLabel}<br>${dp.completed}/${dp.total}</div>`;
                }

                html += `</div></div>`;
            }

            html += `<div style="text-align:center;">
                <button class="reset-progress-btn" onclick="resetProgress()">Reset All Progress</button>
            </div>`;

            document.getElementById('progress').innerHTML = html;
        }

        function showTab(tabId) {
            document.querySelectorAll('.week-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if (tabId === 'progress') {
                renderProgressPage();
            }

            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function showDay(weekId, dayNum) {
            document.querySelectorAll(`#${weekId} .day-content`).forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`#${weekId} .day-btn`).forEach(el => el.classList.remove('active'));

            const dayElement = document.getElementById(`${weekId}-day${dayNum}`);
            const buttonElement = document.querySelector(`#${weekId} .day-btn[data-day="${dayNum}"]`);

            if (dayElement) dayElement.classList.add('active');
            if (buttonElement) buttonElement.classList.add('active');
        }

        function parseWorkoutContent(content, weekNum, dayNum) {
            const lines = content.split('\n');
            let html = '';
            let inSection = '';
            let currentExercise = null;
            let detailsOpen = false;
            let exerciseIndex = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].replace(/^\s+\d+\u2192/, '').trim();

                if (line.match(/^={20,}/) || line.match(/^-{20,}/)) continue;
                if (!line) continue;

                if (line.toUpperCase().includes('WARM-UP') && line.length < 50) {
                    if (currentExercise) {
                        if (detailsOpen) html += '</div>';
                        html += '</div>';
                        currentExercise = null;
                        detailsOpen = false;
                    }
                    html += '<div class="section"><div class="subsection-title">🔥 Warm-Up</div>';
                    inSection = 'warmup';
                } else if (line.toUpperCase().includes('MAIN WORKOUT')) {
                    if (currentExercise) {
                        if (detailsOpen) html += '</div>';
                        html += '</div>';
                        currentExercise = null;
                        detailsOpen = false;
                    }
                    html += '</div><div class="section"><div class="subsection-title">💪 Main Workout</div>';
                    inSection = 'workout';
                } else if (line.toUpperCase().includes('COOL-DOWN')) {
                    if (currentExercise) {
                        if (detailsOpen) html += '</div>';
                        html += '</div>';
                        currentExercise = null;
                        detailsOpen = false;
                    }
                    html += '</div><div class="section"><div class="subsection-title">🧘 Cool-Down & Stretching</div>';
                    inSection = 'cooldown';
                } else if (line.toUpperCase().includes('PROFILE REMINDER')) {
                    html += '<div class="profile-box"><h3>👤 Profile Reminder</h3><ul>';
                    while (i + 1 < lines.length && lines[i + 1].trim() && !lines[i + 1].includes('---')) {
                        i++;
                        const profileLine = lines[i].replace(/^\s+\d+\u2192/, '').trim();
                        if (profileLine.startsWith('-')) {
                            html += `<li>${profileLine.substring(1).trim()}</li>`;
                        }
                    }
                    html += '</ul></div>';
                } else if (line.match(/^NOTES\s*$/)) {
                    if (currentExercise) {
                        if (detailsOpen) html += '</div>';
                        html += '</div>';
                        currentExercise = null;
                        detailsOpen = false;
                    }
                    html += '</div><div class="notes-box"><h4>📝 Important Notes</h4>';
                    while (i + 1 < lines.length) {
                        i++;
                        const noteLine = lines[i].replace(/^\s+\d+\u2192/, '').trim();
                        if (noteLine && !noteLine.match(/^={10,}/)) {
                            html += `<p>${noteLine}</p>`;
                        } else if (noteLine.match(/^={10,}/)) {
                            break;
                        }
                    }
                    html += '</div>';
                } else if (line.match(/^Exercise \d+:/i) || line.match(/^\d+\./)) {
                    if (currentExercise) {
                        if (detailsOpen) html += '</div>';
                        html += '</div>';
                        detailsOpen = false;
                    }

                    const exerciseId = `week${weekNum}-day${dayNum}-ex${exerciseIndex}`;
                    exerciseIndex++;
                    const exerciseName = line.replace(/^Exercise \d+:\s*/i, '').replace(/^\d+\.\s*/, '');
                    const progress = loadProgress();
                    const isCompleted = progress[exerciseId] ? true : false;
                    const completedClass = isCompleted ? ' completed' : '';
                    const btnClass = isCompleted ? ' completed' : '';
                    const btnText = isCompleted ? '✓ Done' : 'Complete';

                    html += `<div class="exercise${completedClass}">`;
                    html += `<div class="exercise-title">${exerciseName}</div>`;
                    html += `<button class="exercise-complete-btn${btnClass}" data-exercise-id="${exerciseId}" onclick="toggleExercise('${exerciseId}')">${btnText}</button>`;
                    currentExercise = {};
                } else if (currentExercise !== null && line.trim()) {
                    if (line.match(/^\s*(Sets|Reps|Duration|Weight|Rest):/i)) {
                        if (!detailsOpen) {
                            html += '<div class="exercise-details">';
                            detailsOpen = true;
                        }
                        const match = line.match(/(\w+):\s*(.+)/);
                        if (match) {
                            html += `<span class="detail-badge">${match[1]}: ${match[2]}</span>`;
                        }
                    } else if (line.match(/^\s*Notes:/i)) {
                        if (detailsOpen) {
                            html += '</div>';
                            detailsOpen = false;
                        }
                        html += `<div class="exercise-notes">${line.replace(/^Notes:\s*/i, '')}</div>`;
                    } else if (line.match(/^\s*Video:/i)) {
                        if (detailsOpen) {
                            html += '</div>';
                            detailsOpen = false;
                        }
                        const url = line.replace(/^\s*Video:\s*/i, '');
                        html += `<a href="${url}" target="_blank" class="video-link">📺 Watch Tutorial</a>`;
                    } else if (currentExercise && !line.match(/^-+$/)) {
                        if (detailsOpen) {
                            html += '</div>';
                            detailsOpen = false;
                        }
                        html += `<div class="exercise-notes">${line}</div>`;
                    }
                }
            }

            if (currentExercise) {
                if (detailsOpen) html += '</div>';
                html += '</div>';
            }
            html += '</div>';

            return html;
        }

        function renderAllWeeks() {
            for (let weekNum = 1; weekNum <= 4; weekNum++) {
                const weekId = `week${weekNum}`;
                const weekData = workoutData.weeks[weekNum];
                if (!weekData) continue;

                let weekHtml = `<div class="section-title">Week ${weekNum}</div>`;
                const dayNumbers = Object.keys(weekData).map(d => parseInt(d)).sort((a, b) => a - b);

                weekHtml += '<div class="day-selector">';
                dayNumbers.forEach((dayNum, index) => {
                    const dayData = weekData[dayNum];
                    const activeClass = index === 0 ? 'active' : '';
                    const relativeDay = ((dayNum - 1) % 7) + 1;
                    const dayProg = getDayProgress(weekNum, dayNum);
                    const progressText = dayProg.total > 0 ? `${dayProg.completed}/${dayProg.total}` : '';
                    const progressClass = (dayProg.completed === dayProg.total && dayProg.total > 0) ? ' all-done' : '';
                    weekHtml += `<button class="day-btn ${activeClass}" data-day="${dayNum}" onclick="showDay('${weekId}', ${dayNum})">
                        <span class="day-num">${dayData.day_of_week} (Day ${relativeDay})</span>
                        <span class="day-type">${dayData.workout_type}</span>
                        <span class="day-progress${progressClass}">${progressText}</span>
                    </button>`;
                });
                weekHtml += '</div>';

                dayNumbers.forEach((dayNum, index) => {
                    const activeClass = index === 0 ? 'active' : '';
                    const dayContent = parseWorkoutContent(weekData[dayNum].content, weekNum, dayNum);
                    weekHtml += `<div id="${weekId}-day${dayNum}" class="day-content ${activeClass}">${dayContent}</div>`;
                });

                document.getElementById(weekId).innerHTML = weekHtml;
            }
        }

        // Initialize
        document.getElementById('overviewText').textContent = workoutData.overview;
        renderAllWeeks();
        renderProgressPage();

    </script>
