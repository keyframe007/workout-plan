er-width apart, descend while\n            keeping chest up and weight in heels. Go as deep as comfortable.\n  Notes: This is a progression from Week 1 (15lb). Great compound movement for\n         legs and core. Focus on controlled descent and explosive ascent.\n  Video: https://www.youtube.com/results?search_query=goblet+squat+kettlebell+form+tutorial\n\nExercise 2: Lat Pulldown\n  Sets: 3 | Reps: 12 | Weight: Increase 5-10lb from Week 1\n  Rest: 60-90 seconds between sets\n  Form Cue: Sit upright, shoulders slightly back. Pull bar down to upper chest,\n            elbows drive down and back. Control the negative on the way up.\n  Notes: Excellent for back strength and posture. Progressive overload week -\n         increase weight slightly from your Week 1 weight.\n  Video: https://www.youtube.com/results?search_query=lat+pulldown+machine+form+tutorial\n\nExercise 3: Leg Press\n  Sets: 3 | Reps: 12 | Weight: Increase 5-10lb from Week 1\n  Rest: 60-90 seconds between sets\n  Form Cue: Seat back fully engaged, feet shoulder-width apart on platform.\n            Lower with control, stopping before knees go past toes. Drive through\n            heels to extend.\n  Notes: Builds lower body strength. Easier on the lower back than free weight\n         squats. Increase weight slightly this week.\n  Video: https://www.youtube.com/results?search_query=leg+press+machine+form+tutorial\n\nExercise 4: Chest Press Machine\n  Sets: 3 | Reps: 12 | Weight: Increase 5-10lb from Week 1\n  Rest: 60-90 seconds between sets\n  Form Cue: Seat back fully, handles at mid-chest level. Push forward and\n            slightly inward, controlling the return to starting position.\n  Notes: Builds upper body pushing strength. This week we increase volume and\n         weight. No rush - control the movement.\n  Video: https://www.youtube.com/results?search_query=chest+press+machine+form+tutorial\n\nExercise 5: Seated Cable Row\n  Sets: 3 | Reps: 12 | Weight: Increase 5-10lb from Week 1\n  Rest: 60-90 seconds between sets\n  Form Cue: Sit upright, slight knee bend. Drive elbows back, squeezing shoulder\n            blades together. Control the return.\n  Notes: Excellent for back and posture, especially helpful with your neck\n         tightness. Progressive weight increase this week.\n  Video: https://www.youtube.com/results?search_query=seated+cable+row+form+tutorial\n\nExercise 6: Plank\n  Sets: 2 | Duration: 30 seconds each\n  Rest: 60 seconds between sets\n  Form Cue: Forearms on ground, body in straight line from head to heels.\n            Engage core, don't let hips sag. Breathe steadily.\n  Notes: Core stability is crucial. If you can hold longer, great! But maintain\n         perfect form - sagging hips reduces benefit.\n  Video: https://www.youtube.com/results?search_query=plank+exercise+form+tutorial\n\n--------------------------------------------------------------------------------\nCOOL-DOWN & STRETCHING (5 minutes)\n--------------------------------------------------------------------------------\n\n1. Slow Walk\n   Duration: 2 minutes at very easy pace on treadmill or walking around gym\n   Purpose: Gradually lower heart rate\n   Video: https://www.youtube.com/results?search_query=cool+down+walking+form\n\n2. Neck Stretches\n   - Neck Lateral Flexion: 30 seconds each side, gentle\n     Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n   - Neck Forward Flexion: 30 seconds, gentle\n     Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+form\n\n3. Chest Stretch (Doorway or Machine)\n   Duration: 30 seconds each side\n   Form Cue: Stretch shoulder muscles across your chest\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n4. Hamstring Stretch\n   Duration: 30 seconds each leg\n   Form Cue: Seated or standing, reach toward toes gently\n   Video: https://www.youtube.com/results?search_query=hamstring+stretch+form+tutorial\n\n5. Child's Pose\n   Duration: 30-45 seconds\n   Form Cue: Knees apart, sink hips back toward heels, arms extended forward\n   Video: https://www.youtube.com/results?search_query=child+pose+yoga+stretch+tutorial\n\n================================================================================\nNOTES\n================================================================================\n\nFORM FOCUS:\nThis week emphasizes progressive overload - more sets and slightly heavier weights.\nResist the urge to go too heavy. Better to leave 2-3 reps \"in the tank\" than to\nsacrifice form. Perfect reps with lighter weight beats sloppy reps with heavy weight.\n\nBREATHING:\n- Exhale during the harder part (pushing/pulling)\n- Inhale during the easier part (lowering/returning)\n- Never hold your breath - this raises blood pressure unnecessarily\n\nHYDRATION:\nYou should sip water between exercises. Aim for half your body weight in ounces\nof water daily (that's about 100 oz for you).\n\nSORENESS:\nSome muscle soreness (DOMS) is normal as you increase volume. If it's severe or\nlasts beyond 3 days, ease back on intensity next session.\n\nYOU'VE GOT THIS!\nYou're moving into progressive overload - your body is adapting. Trust the plan.\nRecord your weights used today so you can compare next week.\n\n================================================================================\n", "day_of_week": "Mon", "date": "Feb17", "workout_type": "Full Body Gym"}, "9": {"filename": "Day_09_Tue_Feb18_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 9 | Tuesday, February 18, 2026 | Rest Day - Stretching & Mobility Focus\n================================================================================\n\nPROFILE REMINDER\n- Rest days are crucial for recovery and adaptation\n- All movements should feel easy and comfortable\n- No heavy exertion - focus on tissue quality and mobility\n- If any stretch causes sharp pain, stop and consult a healthcare provider\n- Hydration remains important on rest days\n\nWEEK 2 REST DAY PROTOCOL\nThis Tuesday is a dedicated recovery day. After Monday's gym session, your muscles\nare working hard to repair and adapt. This stretching routine will:\n- Reduce soreness and stiffness\n- Improve mobility\n- Support your body's recovery process\n- Prepare you mentally for Wednesday's workout\n\nYour neck has taken a lot of sitting tension over the years - these stretches\nare especially important for you.\n\n================================================================================\nMORNING ROUTINE (10-15 minutes) - Start with this when you wake\n================================================================================\n\n1. Neck Lateral Stretch (Lean)\n   Duration: 30 seconds each side\n   Form Cue: Sit upright, gently pull head toward one shoulder using opposite\n             hand. Keep shoulders relaxed. Feel stretch on side of neck.\n   Reps: 2 sets each side\n   Notes: Extremely important for your stiff neck. Move slowly, never bounce.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n2. Neck Forward Flexion Stretch\n   Duration: 30 seconds, 2 sets\n   Form Cue: Sit upright, gently lower chin toward chest. You can place hands\n             behind head for light additional stretch, but don't force it.\n   Notes: Targets posterior neck and upper trapezius. Go gently - this area\n          holds lots of tension from your work life.\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n3. Upper Trapezius Stretch\n   Duration: 30 seconds each side, 2 sets\n   Form Cue: Sit upright. Use one hand to pull head toward opposite shoulder\n             at a 45-degree angle. Feel gentle stretch in the back-side of neck.\n   Notes: This muscle gets very tight from computer work and sitting.\n   Video: https://www.youtube.com/results?search_query=upper+trapezius+stretch+form+tutorial\n\n4. Levator Scapulae Stretch\n   Duration: 30 seconds each side, 2 sets\n   Form Cue: Sit upright. Pull head down and forward at about 45 degrees\n             (toward opposite armpit). Exhale into the stretch.\n   Notes: Often the culprit in neck and shoulder tightness. Very therapeutic.\n   Video: https://www.youtube.com/results?search_query=levator+scapulae+stretch+form+tutorial\n\n5. Chest Doorway Stretch\n   Duration: 45 seconds, 2 sets\n   Form Cue: Stand in doorway. Forearm on frame at 90 degrees. Step through\n             doorway until you feel stretch across front of shoulder and chest.\n   Notes: Counteracts hunched posture from sitting. Breathing into this stretch\n          is key - exhale and relax deeper.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n6. Cat-Cow Stretch (Dynamic)\n   Reps: 10 repetitions\n   Form Cue: On hands and knees. Alternate between arching back (cow) and\n             rounding spine (cat). Move slowly with your breath.\n   Notes: Mobilizes entire spine. Excellent for spinal mobility and core awareness.\n   Video: https://www.youtube.com/results?search_query=cat+cow+yoga+stretch+tutorial\n\n7. Thread the Needle Stretch\n   Duration: 30 seconds each side, 8 reps total\n   Form Cue: Lying on back, knees bent. Take right ankle and place on left knee\n             (figure-4 position). Pull left knee toward chest gently.\n   Notes: Opens up hips and glutes. Important counterstretch to sitting.\n   Video: https://www.youtube.com/results?search_query=thread+the+needle+stretch+form+tutorial\n\n8. Hip Flexor Stretch (Low Lunge)\n   Duration: 45 seconds each side, 2 sets\n   Form Cue: Half-kneeling position. Front knee at 90 degrees, back knee down\n             on cushion/towel. Press hips forward gently. Keep torso upright.\n   Notes: Hip flexors get shortened from sitting all day. Essential stretch for you.\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+low+lunge+tutorial\n\n9. Hamstring Stretch (Seated or Standing)\n   Duration: 45 seconds each leg, 2 sets\n   Form Cue: Seated version: sit with one leg extended, other bent. Lean forward\n             gently from hips toward extended leg. Or standing: place heel on\n             bench/step, hinge forward gently.\n   Notes: Hamstrings are often tight. Breathe deeply into this stretch.\n   Video: https://www.youtube.com/results?search_query=hamstring+stretch+form+tutorial\n\n10. Figure-4 Glute Stretch\n    Duration: 45 seconds each side, 2 sets\n    Form Cue: Lying on back, cross one ankle over opposite knee. Pull bottom\n              leg toward chest gently.\n    Notes: Deep hip and glute stretch. Targets piriformis muscle that can\n           compress sciatic nerve if too tight.\n    Video: https://www.youtube.com/results?search_query=figure+4+glute+stretch+form+tutorial\n\n11. Child's Pose (Relaxation)\n    Duration: 60 seconds, 1 set\n    Form Cue: Knees apart, sink hips back toward heels, arms extended forward.\n              Rest forehead on mat. Breathe deeply and relax.\n    Notes: Calm, restorative finish to your morning routine.\n    Video: https://www.youtube.com/results?search_query=child+pose+yoga+stretch+tutorial\n\n================================================================================\nEVENING ROUTINE (5-10 minutes) - Before bed or early evening\n================================================================================\n\n1. Gentle Neck Circles\n   Reps: 10 circles each direction\n   Form Cue: Sit upright. Slowly drop chin toward chest, roll to one shoulder,\n             then the other. Reverse direction. Smooth, continuous motion.\n   Notes: Excellent mobility work. Much better than jerky movements.\n   Video: https://www.youtube.com/results?search_query=neck+circles+mobility+tutorial\n\n2. Shoulder Rolls\n   Reps: 10 forward, 10 backward\n   Form Cue: Stand upright. Roll shoulders up, back, down, forward in smooth\n             continuous motion. Really emphasize rolling them back.\n   Notes: Counteracts the rounded-forward posture from sitting.\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+mobility+tutorial\n\n3. World's Greatest Stretch\n   Reps: 5 per side\n   Form Cue: From standing, step right foot forward into lunge. Place hands\n             on ground, rotate torso open. Reach arm up. Step back, alternate.\n   Notes: Full-body mobility work. Takes care of multiple muscle groups at once.\n   Video: https://www.youtube.com/results?search_query=world's+greatest+stretch+tutorial\n\n4. Pigeon Pose\n   Duration: 45 seconds each side\n   Form Cue: Starting in tabletop, bring right knee behind right wrist, flex\n             right foot. Lower hips slowly. Feel deep hip stretch.\n   Notes: Intense hip opener. Move slowly into it. Breathe through any tightness.\n   Video: https://www.youtube.com/results?search_query=pigeon+pose+yoga+tutorial\n\n5. Supine Spinal Twist\n   Duration: 30 seconds each side\n   Form Cue: Lying on back, bring right knee across body toward left side.\n             Keep shoulder blades on floor. Head can turn opposite direction.\n   Notes: Gentle spinal mobility. Excellent for lower back and obliques.\n   Video: https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+tutorial\n\n================================================================================\nREST DAY RECOVERY NOTES\n================================================================================\n\nHYDRATION:\nContinue drinking plenty of water. Your muscles are repairing - they need\nadequate hydration to do so efficiently.\n\nNUTRITION:\nEat enough protein (0.7-1g per lb of body weight). With 100kg (220lbs), aim for\n150-220g of protein daily. This supports muscle repair.\n\nSLEEP:\nQuality sleep is when most of your muscle repair happens. Aim for 7-9 hours.\nThe stretching routine can help relax you before bed.\n\nMONITORING SORENESS:\nSome muscle soreness is expected after Monday's session. It should peak around\nDay 2-3 and gradually improve. This is DOMS (Delayed Onset Muscle Soreness),\nnot injury. Movement and stretching help.\n\nCONSISTENCY:\nThese mobility routines are just as important as your workouts. Spend time with\nthem. Your neck will thank you especially.\n\nYOU'RE DOING AMAZING!\nWeek 1 built your foundation. Week 2 is where you start seeing real progress.\nTaking these rest days seriously is how champions are made.\n\n================================================================================\n", "day_of_week": "Tue", "date": "Feb18", "workout_type": "Stretching Mobility"}, "10": {"filename": "Day_10_Wed_Feb19_Kettlebell_Bands_Home.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 10 | Wednesday, February 19, 2026 | Kettlebell & Bands (Home Session)\n================================================================================\n\nPROFILE REMINDER\n- Goal: Build strength, lose fat, improve overall fitness\n- Keep rest between sets: 60-90 seconds\n- Rate of Perceived Exertion (RPE): Aim for 6-7 out of 10\n- If any exercise causes pain (not just discomfort), STOP and skip it\n- Stay hydrated - drink water before, during, and after\n\nWEEK 2 PROGRESS NOTE\nHalfway through Week 2! This home session gives you a different stimulus than\nMonday's gym work. Kettlebell and band training builds functional strength and\nis highly effective for fat loss. You should feel capable - you've already got\ntwo tough sessions under your belt this week!\n\n================================================================================\nWARM-UP (5 minutes)\n================================================================================\n\n1. March in Place\n   Duration: 2 minutes\n   Form Cue: Stand upright. Lift knees to hip level with each step. Swing arms\n             naturally. Gradually increase pace if comfortable.\n   Purpose: Get heart rate elevated, prepare nervous system for work\n   Video: https://www.youtube.com/results?search_query=march+in+place+warm+up+form\n\n2. Arm Circles\n   Reps: 10 forward, 10 backward each arm\n   Form Cue: Extend arms out to sides. Make small circles that gradually get\n             larger. Full range of motion.\n   Video: https://www.youtube.com/results?search_query=arm+circles+dynamic+stretch+form\n\n3. Bodyweight Squats\n   Reps: 10\n   Form Cue: Feet shoulder-width apart, descend with control, weight in heels.\n             No weight needed - just get the pattern down.\n   Notes: Activates legs for the kettlebell work to come\n   Video: https://www.youtube.com/results?search_query=bodyweight+squat+form+tutorial\n\n4. Hip Circles\n   Reps: 10 circles each direction\n   Form Cue: Hands on hips. Make large circles with your hips. Slow, controlled.\n   Video: https://www.youtube.com/results?search_query=hip+circles+dynamic+warm+up+form\n\n================================================================================\nMAIN WORKOUT\n================================================================================\n\nExercise 1: Kettlebell Swing\n  Sets: 2 | Reps: 12 | Weight: 20lb\n  Rest: 60-90 seconds between sets\n  Form Cue: Feet shoulder-width apart, kettlebell in front. Hinge at hips,\n            drive through heels explosively. Kettlebell swings to about shoulder\n            height. Control the descent. This is a hip hinge movement, not a squat.\n  Notes: One of the most effective full-body exercises. The swing builds\n         cardiovascular fitness while strengthening posterior chain (glutes,\n         hamstrings, lower back). Step up to 20lb this week.\n  Video: https://www.youtube.com/results?search_query=kettlebell+swing+form+tutorial\n\nExercise 2: Push-ups\n  Sets: 2 | Reps: 10 | (From knees if needed, or regular)\n  Rest: 60 seconds between sets\n  Form Cue: (Full push-up) Hands slightly wider than shoulders, body in straight\n            line. Lower until chest nearly touches floor, press back up.\n            (Knee push-up) Same form, knees on ground for assistance.\n  Notes: Choose the variation that allows you to maintain perfect form. No shame\n         in knee push-ups - plenty of strong people use them. Quality over ego.\n  Video: https://www.youtube.com/results?search_query=push+up+form+tutorial\n\nExercise 3: Kettlebell Single-Arm Row\n  Sets: 2 | Reps: 12 per arm | Weight: 20lb\n  Rest: 60 seconds between sets\n  Form Cue: Hinge forward slightly at hips, kettlebell hangs at arm's length.\n            Pull kettlebell toward hip, driving elbow back. Keep core tight.\n            Return with control. Complete all reps one side before switching.\n  Notes: Excellent unilateral movement that fixes strength imbalances. Building\n         back strength and postural muscles. Great for your neck support.\n  Video: https://www.youtube.com/results?search_query=kettlebell+single+arm+row+tutorial\n\nExercise 4: Band Pull-Apart\n  Sets: 3 | Reps: 15 | Resistance: Light band\n  Rest: 45 seconds between sets\n  Form Cue: Stand upright, band at shoulder height, arms extended in front.\n            Pull band apart by driving elbows back. Squeeze shoulder blades\n            together. Return with control.\n  Notes: This exercise is particularly valuable for your neck and shoulder\n         health. Light resistance, high reps. Focus on the squeeze.\n         Use a light resistance band.\n  Video: https://www.youtube.com/results?search_query=band+pull+apart+exercise+tutorial\n\nExercise 5: Kettlebell Sumo Deadlift\n  Sets: 2 | Reps: 12 | Weight: 25lb\n  Rest: 60-90 seconds between sets\n  Form Cue: Feet wider than shoulder-width, toes slightly out. Kettlebell held\n            in both hands. Hinge at hips and slightly squat down. Chest up.\n            Drive through heels to stand, kettlebell stays close to body.\n  Notes: Wide stance variation targets inner thighs and glutes differently than\n         goblet squats. The 25lb represents solid progression. Great for lower\n         body and grip strength.\n  Video: https://www.youtube.com/results?search_query=kettlebell+sumo+deadlift+form+tutorial\n\nExercise 6: Dead Bug\n  Sets: 2 | Reps: 10 per side | No weight\n  Rest: 45 seconds between sets\n  Form Cue: Lying on back, arms straight up toward ceiling, knees bent at 90\n            degrees. Slowly lower opposite arm overhead and opposite leg\n            straight. Return to start. Alternate sides. Move slowly.\n  Notes: Trains core stability and anti-rotation strength. Protective for your\n         lower back during other movements. This is skill-based - master the\n         pattern.\n  Video: https://www.youtube.com/results?search_query=dead+bug+exercise+form+tutorial\n\nExercise 7: Kettlebell Halo\n  Sets: 2 | Reps: 8 each direction | Weight: 10lb\n  Rest: 45 seconds between sets\n  Form Cue: Stand upright, kettlebell held upside-down at chest (hands on handle\n            inside the bell). Move kettlebell around head in a circular motion,\n            keeping it close to body. One direction, then other direction.\n  Notes: Excellent shoulder mobility and stability exercise. Lighter kettlebell\n         is appropriate here. Helps restore shoulder function.\n  Video: https://www.youtube.com/results?search_query=kettlebell+halo+exercise+tutorial\n\n================================================================================\nCOOL-DOWN & STRETCHING (5 minutes)\n================================================================================\n\n1. Neck Stretches\n   - Neck Lateral Flexion: 30 seconds each side\n     Form Cue: Gentle pull of head toward shoulder\n     Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n   - Neck Forward Flexion: 30 seconds\n     Form Cue: Gentle drop of chin toward chest\n     Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n2. Hip Flexor Stretch (Low Lunge)\n   Duration: 45 seconds each side\n   Form Cue: Half-kneeling, press hips forward gently\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+low+lunge+tutorial\n\n3. Hamstring Stretch\n   Duration: 45 seconds each leg\n   Form Cue: Seated or standing, reach gently toward toes\n   Video: https://www.youtube.com/results?search_query=hamstring+stretch+form+tutorial\n\n4. Child's Pose\n   Duration: 60 seconds\n   Form Cue: Knees apart, sink hips back, arms extended forward\n   Notes: Calm, grounding finish to your workout\n   Video: https://www.youtube.com/results?search_query=child+pose+yoga+stretch+tutorial\n\n================================================================================\nPERFORMANCE NOTES\n================================================================================\n\nHOME WORKOUT ADVANTAGES:\n- No equipment needed for some exercises (push-ups, dead bug)\n- You can control the pace and environment\n- More time under tension possible with kettlebells\n- Band training is incredibly effective and portable\n\nKETTLEBELL PROGRESSION:\nThis week you've moved to 20lb on swings and single-arm rows, and 25lb on\nsumo deadlifts. This represents real progress from Week 1. Your strength\nis building!\n\nBANDS & MOBILITY:\nThe pull-aparts with the light band are not about heavy resistance - they're\nabout quality movement and correcting postural imbalances. Spend time with\nthese.\n\nBREATHING DURING KETTLEBELL WORK:\n- Swing: Exhale forcefully on the drive up\n- Row: Exhale as you pull kettlebell in\n- Deadlift: Exhale as you drive up\n- Halo: Breathe steadily throughout\n\nINTENSITY MONITORING:\nThis workout should feel challenging but sustainable. If you're gasping for\nbreath or can't maintain form, dial back slightly. Progressive overload doesn't\nmean going all-out every session.\n\nFORM OVER VOLUME:\nKettlebell work rewards perfect form. One perfect swing is worth more than ten\nsloppy ones. Take your time between sets. Use the 60-90 second rest windows to\nreset mentally and physically.\n\nYOU'RE CRUSHING IT!\nThree days into Week 2 and you're adding serious training stimulus. Your body\nis adapting. Stay consistent through the weekend and you'll be amazed at your\nprogress by next Monday.\n\n================================================================================\n", "day_of_week": "Wed", "date": "Feb19", "workout_type": "Kettlebell Bands Home"}, "11": {"filename": "Day_11_Thu_Feb20_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 11 | Thursday, February 20, 2026 | Rest Day - Stretching & Mobility (Neck Focus)\n================================================================================\n\nPROFILE REMINDER\n- Rest days are crucial for recovery and adaptation\n- All movements should feel easy and comfortable\n- No heavy exertion - focus on tissue quality and mobility\n- If any stretch causes sharp pain, stop and consult a healthcare provider\n- Hydration remains important on rest days\n\nWEEK 2 REST DAY PROTOCOL - NECK RECOVERY FOCUS\nAfter three intense training days this week (Monday gym, Wednesday kettlebells),\nyour body is working hard to recover. Thursday's rest day is specifically designed\nwith extra emphasis on neck and shoulder recovery, since your stiff neck from\nsitting is a key limitation we're addressing.\n\nThis is active recovery - gentle movement that enhances blood flow and recovery\nwithout adding training stress.\n\n================================================================================\nMORNING ROUTINE (10-15 minutes) - Start with this when you wake\n================================================================================\n\nNECK RECOVERY SECTION (Extra focus this week)\n================================\n\n1. Gentle Neck Mobilization (Start here)\n   Duration: 2 minutes of slow, controlled movement\n   Form Cue: Sitting upright, slowly drop chin toward chest. Pause. Gently\n             rotate head to look over each shoulder. Feel the gentle stretch.\n             Move at 50% of your normal speed - this is about control.\n   Reps: 5 full circles each direction\n   Notes: This gentle mobilization increases blood flow to tight neck muscles\n          and begins the relaxation process. Start your day with this.\n   Video: https://www.youtube.com/results?search_query=gentle+neck+mobilization+tutorial\n\n2. Neck Lateral Stretch (Lean)\n   Duration: 45 seconds each side, 2 sets\n   Form Cue: Sit upright, gently pull head toward one shoulder using opposite\n             hand. Keep shoulders relaxed and down. Feel stretch on side of neck.\n             Breathe deeply - exhale into the stretch.\n   Notes: Your neck holds tremendous tension. This stretch directly addresses\n          your primary limitation. Spend extra time here. Breathe slowly.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n3. Neck Forward Flexion Stretch\n   Duration: 45 seconds, 2 sets\n   Form Cue: Sit upright, slowly lower chin toward chest. You can place hands\n             gently behind head for light additional stretch. Never force it.\n             Let gravity do the work.\n   Notes: Targets posterior neck and upper trapezius muscles. The muscles that\n          get shortened from computer work. Very therapeutic.\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n4. Upper Trapezius Stretch\n   Duration: 45 seconds each side, 2 sets\n   Form Cue: Sit upright. Use one hand to pull head toward opposite shoulder\n             at a 45-degree angle (toward opposite armpit). Feel stretch in\n             back-side of neck and top of shoulder.\n   Notes: This muscle is often the culprit in neck stiffness. Spend quality\n          time here. The upper trap responds well to patient stretching.\n   Video: https://www.youtube.com/results?search_query=upper+trapezius+stretch+form+tutorial\n\n5. Levator Scapulae Stretch\n   Duration: 45 seconds each side, 2 sets\n   Form Cue: Sit upright. Pull head down and forward at about 45 degrees\n             (imagine looking toward opposite armpit). Exhale into the stretch.\n             This muscle connects neck to shoulder blade.\n   Notes: Often the main source of neck and shoulder tightness. Patient,\n          consistent stretching of this muscle yields great results.\n   Video: https://www.youtube.com/results?search_query=levator+scapulae+stretch+form+tutorial\n\n6. Suboccipital Release (With Self Massage)\n   Duration: 60 seconds\n   Form Cue: Place thumbs at base of skull (where skull meets neck). Apply\n             gentle upward pressure. Move slowly. Breathe deeply. This is\n             self-massage, not aggressive.\n   Notes: Suboccipital muscles are deep neck muscles that contribute to headaches\n          and stiffness. Gentle pressure release helps tremendously.\n   Video: https://www.youtube.com/results?search_query=suboccipital+release+self+massage+tutorial\n\nEND OF NECK SECTION\n\n================================================================================\nFULL BODY STRETCHING (Following the neck work)\n================================================================================\n\n7. Chest Doorway Stretch\n   Duration: 45 seconds, 2 sets\n   Form Cue: Stand in doorway. Forearm on frame at 90 degrees. Step through\n             doorway until you feel stretch across front of shoulder and chest.\n   Notes: Counteracts hunched posture that contributes to neck tension.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n8. Cat-Cow Stretch (Dynamic)\n   Reps: 12 repetitions (slightly more than usual)\n   Form Cue: On hands and knees. Alternate between arching back (cow) and\n             rounding spine (cat). Move slowly with your breath. Full range.\n   Notes: Mobilizes entire spine. Counteracts the forward flexion from sitting.\n   Video: https://www.youtube.com/results?search_query=cat+cow+yoga+stretch+tutorial\n\n9. Thread the Needle Stretch\n   Duration: 30 seconds each side, 8 reps total\n   Form Cue: Lying on back, knees bent. Take right ankle and place on left knee\n             (figure-4 position). Pull left knee toward chest gently.\n   Notes: Opens hips and glutes.\n   Video: https://www.youtube.com/results?search_query=thread+the+needle+stretch+form+tutorial\n\n10. Hip Flexor Stretch (Low Lunge)\n    Duration: 60 seconds each side, 2 sets\n    Form Cue: Half-kneeling position. Front knee at 90 degrees, back knee down\n              on cushion/towel. Press hips forward gently. Keep torso upright.\n    Notes: Hip flexors shorten significantly from sitting. This is crucial.\n    Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+low+lunge+tutorial\n\n11. Hamstring Stretch (Seated or Standing)\n    Duration: 45 seconds each leg, 2 sets\n    Form Cue: Seated version: sit with one leg extended, other bent. Lean\n              forward gently from hips. Or standing: place heel on bench/step,\n              hinge forward gently.\n    Notes: Hamstrings are often tight. They also affect your lower back and\n           hip mobility.\n    Video: https://www.youtube.com/results?search_query=hamstring+stretch+form+tutorial\n\n12. Figure-4 Glute Stretch\n    Duration: 45 seconds each side, 2 sets\n    Form Cue: Lying on back, cross one ankle over opposite knee. Pull bottom\n              leg toward chest gently. Deep hip stretch.\n    Notes: Glutes and hip muscles get tight from sitting.\n    Video: https://www.youtube.com/results?search_query=figure+4+glute+stretch+form+tutorial\n\n13. Child's Pose (Relaxation)\n    Duration: 90 seconds, 1 set\n    Form Cue: Knees apart, sink hips back toward heels, arms extended forward.\n              Rest forehead on mat. Breathe deeply and relax completely.\n    Notes: Spend extra time here on this rest day. It's restorative and calming.\n    Video: https://www.youtube.com/results?search_query=child+pose+yoga+stretch+tutorial\n\n================================================================================\nEVENING ROUTINE (5-10 minutes) - Before bed or early evening\n================================================================================\n\n1. Gentle Neck Circles (Slow)\n   Reps: 5 circles each direction\n   Form Cue: Sit upright. Slowly drop chin toward chest, roll to one shoulder,\n             then the other. Reverse direction. Very smooth, no jerky movements.\n   Notes: Prepare your neck for sleep.\n   Video: https://www.youtube.com/results?search_query=neck+circles+mobility+tutorial\n\n2. Shoulder Rolls (Emphasis on Backward)\n   Reps: 10 forward, 15 backward\n   Form Cue: Stand upright. Roll shoulders up, back, down, forward. Emphasize\n             the backward roll - this counteracts forward hunching.\n   Notes: Quality over speed.\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+mobility+tutorial\n\n3. World's Greatest Stretch\n   Reps: 5 per side\n   Form Cue: From standing, step right foot forward into lunge. Hands on\n             ground, rotate torso open. Reach arm up. Step back, alternate.\n   Notes: Full-body prep for sleep - mobilizes hips, thorax, shoulders.\n   Video: https://www.youtube.com/results?search_query=world's+greatest+stretch+tutorial\n\n4. Pigeon Pose\n   Duration: 60 seconds each side\n   Form Cue: Starting in tabletop, bring right knee behind right wrist, flex\n             right foot to protect knee. Lower hips slowly. Breathe through\n             any sensation.\n   Notes: Deep hip opener. Give yourself time with this.\n   Video: https://www.youtube.com/results?search_query=pigeon+pose+yoga+tutorial\n\n5. Supine Spinal Twist (Extra slow)\n   Duration: 45 seconds each side\n   Form Cue: Lying on back, bring right knee across body toward left side.\n             Keep shoulder blades on floor. Head can turn opposite direction.\n             Breathe into it.\n   Notes: Gentle spinal rotation aids digestion and relaxation.\n   Video: https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+tutorial\n\n6. Legs-Up-The-Wall Pose (Optional, if you have space)\n   Duration: 3-5 minutes\n   Form Cue: Sit sideways against a wall, lower torso, extend legs up wall.\n             Arms out to sides. Completely passive position.\n   Notes: Restorative pose. Excellent for circulation and recovery.\n   Video: https://www.youtube.com/results?search_query=legs+up+wall+pose+yoga+tutorial\n\n================================================================================\nTHURSDAY RECOVERY NOTES\n================================================================================\n\nTHREE DAYS DOWN:\nYou've completed three challenging training days this week. Your body is\nadapting. These active recovery days are where the magic happens - this is\nwhen your muscles repair and grow stronger.\n\nNECK FOCUS PRIORITY:\nThe extra emphasis on neck work today is intentional. Your stiff neck has been\na limiting factor. Consistent, patient work on these muscles will yield real\nimprovements. In 4-6 weeks you'll notice significant mobility gains.\n\nSORENESS STATUS:\nMonday's workout may have caused some soreness by now (DOMS). This is normal\nand indicates muscle damage that will repair stronger. The stretching helps\nmanage it. Soreness typically peaks around Day 2-3 after the workout.\n\nHYDRATION & NUTRITION:\nStay hydrated. Eat adequate protein. Your body needs these basics to recover\nproperly. Aim for 7-9 hours of sleep tonight - sleep is when most recovery\nhappens.\n\nBREATHING & RELAXATION:\nThroughout these stretches, emphasize deep breathing. Exhale slowly into each\nstretch. This activates your parasympathetic nervous system (rest and recovery).\n\nMENTAL GAME:\nYou're halfway through Week 2. One more gym day and two more rest days ahead.\nYou're building momentum. Your consistency this week is exactly what creates\nlong-term results.\n\nONE MORE BIG DAY AHEAD:\nFriday's pool session is different stimulus than your strength work. It will\nfeel good after these recovery days.\n\nYOU'RE DOING EXCELLENT WORK!\nPatience with mobility work pays huge dividends. Your neck, shoulders, and\nhips will thank you.\n\n================================================================================\n", "day_of_week": "Thu", "date": "Feb20", "workout_type": "Stretching Mobility"}, "12": {"filename": "Day_12_Fri_Feb21_Pool_Swimming.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 12 | Friday, February 21, 2026 | Pool / Swimming Session\n================================================================================\n\nPROFILE REMINDER\n- Goal: Build strength, lose fat, improve overall fitness\n- Keep rest between sets: 30 seconds for swimming intervals\n- Rate of Perceived Exertion (RPE): Aim for 6-7 out of 10\n- If you feel any sharp pain or dizziness, stop immediately and exit pool\n- Stay hydrated - drink water before and after (though you're in water!)\n\nWEEK 2 PROGRESS NOTE\nGreat work this week! Today is your final structured workout of Week 2. Swimming\nis an incredible low-impact way to build cardiovascular fitness, improve mobility,\nand train full-body endurance. After three intense days, this feels different -\nand that's exactly what your body needs. The pool is your friend.\n\n================================================================================\nWARM-UP (5 minutes poolside + in water)\n================================================================================\n\n1. Poolside Stretches\n   Duration: 3 minutes\n\n   a) Calf Stretch (on pool edge)\n      Duration: 30 seconds each leg\n      Form Cue: Foot on edge, gently press heel down\n      Video: https://www.youtube.com/results?search_query=calf+stretch+poolside+tutorial\n\n   b) Quadriceps Stretch (on pool edge)\n      Duration: 30 seconds each leg\n      Form Cue: Pull foot toward glutes\n      Video: https://www.youtube.com/results?search_query=quadriceps+stretch+standing+tutorial\n\n   c) Hip Flexor Stretch (on pool edge)\n      Duration: 30 seconds each side\n      Form Cue: Similar to lunge position, but holding pool edge\n      Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+poolside+tutorial\n\n   d) Hamstring Stretch (on pool edge)\n      Duration: 30 seconds each leg\n      Form Cue: Place heel on edge, lean forward gently\n      Video: https://www.youtube.com/results?search_query=hamstring+stretch+standing+tutorial\n\n   e) Arm Circles and Shoulder Rotations\n      Reps: 10 each direction\n      Form Cue: Full range of motion, getting shoulders ready\n      Video: https://www.youtube.com/results?search_query=shoulder+rotation+stretch+tutorial\n\n2. Walk Pool Length\n   Duration: 2 minutes of easy walking in shallow end\n   Form Cue: Walk at easy pace, gradually immerse yourself. Let body adjust\n             to water temperature. This is preparatory, not intense.\n   Video: https://www.youtube.com/results?search_query=pool+walking+warm+up+tutorial\n\n================================================================================\nMAIN WORKOUT (Approximately 25 minutes total)\n================================================================================\n\nTOTAL VOLUME TODAY:\n- 4 x 25m freestyle warm-up (100m total)\n- 6 x 25m freestyle intervals (150m total)\n- 4 x 25m breaststroke (100m total)\n- 5 minutes continuous mixed-stroke\n- 2 x 45 second treading water\n- 2 x 25m backstroke cool-down (50m total)\n\nSTROKE FOCUS VIDEO LIBRARY:\n\nFreestyle / Front Crawl:\nVideo: https://www.youtube.com/results?search_query=freestyle+stroke+swimming+form+tutorial\n\nBreaststroke:\nVideo: https://www.youtube.com/results?search_query=breaststroke+swimming+form+tutorial\n\nBackstroke:\nVideo: https://www.youtube.com/results?search_query=backstroke+swimming+form+tutorial\n\nTreading Water:\nVideo: https://www.youtube.com/results?search_query=treading+water+swimming+tutorial\n\n================================================================================\n\nSEGMENT 1: Freestyle Warm-up (5 minutes)\n---\n\nExercise: Easy Freestyle Warm-up\nDistance: 4 x 25m (100m total)\nRest: Walk back / easy rest, about 30 seconds between efforts\nForm Cues:\n  - Keep this completely easy and comfortable\n  - Focus on relaxed, rhythmic breathing\n  - High elbow recovery\n  - Long, smooth strokes\n  - No sprinting - this is purely activation\n\nPurpose: Get your cardiovascular system engaged, practice stroke technique,\n         allow muscles to warm up fully.\n\nNotes: If 25m is too much, do 15m. If it's too easy, you can swim 50m straight.\n       Adjust distance to your comfort level - this is warm-up, not the workout.\n       Feel out the water, get your rhythm, relax.\n\nVideo: https://www.youtube.com/results?search_query=freestyle+stroke+swimming+form+tutorial\n\n---\n\nSEGMENT 2: Freestyle Intervals (6-8 minutes)\n---\n\nExercise: Freestyle Intervals\nDistance: 6 x 25m (150m total)\nIntensity: 6-7 out of 10 RPE (challenging but sustainable)\nRest: 30 seconds between efforts\nForm Cues:\n  - Maintain good form even when tired\n  - Breathe rhythmically (every 2-3 strokes)\n  - Engage your core\n  - High elbow recovery\n  - Push off wall hard for each repeat\n\nPurpose: Build cardiovascular fitness and work capacity. The interval structure\n         allows you to do more volume than continuous swimming.\n\nNotes: This is your primary \"work\" segment today. You should be noticeably\n       breathing harder than the warm-up, but still able to complete all reps.\n       If you can't finish a rep, do fewer reps and extend rest. Form over\n       intensity. Don't touch the bottom.\n\nVideo: https://www.youtube.com/results?search_query=freestyle+intervals+swimming+workout+tutorial\n\n---\n\nSEGMENT 3: Breaststroke Work (4-5 minutes)\n---\n\nExercise: Breaststroke\nDistance: 4 x 25m (100m total)\nIntensity: 5-6 out of 10 RPE (slightly easier than freestyle intervals)\nRest: 30 seconds between efforts\nForm Cues:\n  - Powerful leg drive (whip kick)\n  - Long pull with arms\n  - Smooth rhythm\n  - Let legs do the work\n  - Head control - look slightly forward, not straight down\n\nPurpose: Work different muscle groups than freestyle. Breaststroke uses different\n         strength patterns and gives your freestyle muscles a slight break.\n         Excellent for hip and inner thigh mobility.\n\nNotes: Breaststroke should feel more relaxing than freestyle intervals. If you\n       don't know breaststroke, substitute more freestyle or use this time to\n       practice form at easy pace.\n\nVideo: https://www.youtube.com/results?search_query=breaststroke+swimming+form+tutorial\n\n---\n\nSEGMENT 4: Continuous Mixed-Stroke Swim (5 minutes)\n---\n\nExercise: Continuous Swimming (Mix strokes)\nDuration: 5 minutes\nIntensity: 5-6 out of 10 RPE (steady, conversational pace)\nStroke Options: Freestyle, breaststroke, backstroke - mix as desired\nForm Cues:\n  - Stay relaxed\n  - Consistent pace\n  - Don't push hard - this is steady state\n  - Focus on enjoying the movement\n\nPurpose: Build aerobic base and endurance. The continuous, moderate-intensity\n         work is excellent for fat loss and cardiovascular health.\n\nNotes: You can change strokes whenever you want during this 5 minutes. Some\n       people prefer switching every 50m. Find what feels good. This should\n       feel almost meditative by this point in the session.\n\nVideo: https://www.youtube.com/results?search_query=swimming+endurance+training+tutorial\n\n---\n\nSEGMENT 5: Treading Water (2-3 minutes)\n---\n\nExercise: Treading Water\nDuration: 2 x 45 seconds\nRest: Walk around in water or hold onto wall, 45 seconds between efforts\nIntensity: 6-7 out of 10 RPE (challenging but manageable)\nForm Cues:\n  - Upright posture\n  - Hands can be used to help, or hands overhead for added difficulty\n  - Scissor kick with legs\n  - Small arm circles for balance\n  - Engage your core\n\nPurpose: Intense cardiovascular work that challenges stabilizer muscles and\n         builds core strength. No impact on joints.\n\nNotes: If you can't tread water, substitute with stationary running in shallow\n       end or walking in chest-deep water. Treading is hard - don't be discouraged\n       if you can only do 20-30 seconds at first.\n\nVideo: https://www.youtube.com/results?search_query=treading+water+swimming+tutorial\n\n---\n\nCOOL-DOWN: Easy Swimming (3-5 minutes)\n---\n\nExercise: Easy Backstroke\nDistance: 2 x 25m (50m total)\nRest: Walk back, easy rest\nIntensity: 3-4 out of 10 RPE (very easy)\nForm Cues:\n  - Completely relaxed\n  - Focus on breathing\n  - Let the water support you\n  - Smooth, long strokes\n  - Just enjoy being in the water\n\nPurpose: Transition back to resting heart rate, allow muscles to recover,\n         stretch yourself in the water.\n\nVideo: https://www.youtube.com/results?search_query=backstroke+swimming+form+tutorial\n\n---\n\nPOOLSIDE COOL-DOWN & STRETCHING (2-3 minutes)\n---\n\n1. Chest Stretch\n   Duration: 30 seconds, in shallow end\n   Form Cue: Reach arms behind back, press chest forward gently\n   Video: https://www.youtube.com/results?search_query=chest+stretch+in+water+tutorial\n\n2. Hip Flexor Stretch\n   Duration: 30 seconds each side\n   Form Cue: At pool edge, one leg extended back\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+poolside+tutorial\n\n3. Quad Stretch\n   Duration: 30 seconds each leg\n   Form Cue: At pool edge, pull foot toward glutes\n   Video: https://www.youtube.com/results?search_query=quadriceps+stretch+poolside+tutorial\n\n4. Hamstring Stretch\n   Duration: 30 seconds each leg\n   Form Cue: Foot on edge, lean forward gently\n   Video: https://www.youtube.com/results?search_query=hamstring+stretch+standing+tutorial\n\n5. Shoulder Rolls\n   Reps: 10 forward, 10 backward\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+mobility+tutorial\n\n================================================================================\nPERFORMANCE NOTES\n================================================================================\n\nSWIMMING AS CROSS-TRAINING:\nSwimming is perfect complement to your gym and kettlebell work because:\n- Zero impact on joints\n- Full-body workout with emphasis on cardiovascular fitness\n- Improves mobility and movement quality\n- Great for fat loss without as much metabolic stress as heavy strength\n- Meditative and mentally restorative\n\nYOUR BASELINE:\nIf you haven't swum in years, this will feel challenging. That's perfect.\nYou're building a new capacity. By Week 4, this same workout will feel\nsignificantly easier.\n\nBREATHING TECHNIQUE:\nRhythmic breathing during freestyle prevents excessive oxygen depletion.\nPractice breathing every 2-3 strokes. Bilateral breathing (alternating sides)\nis ideal, but breathing to your dominant side is fine while learning.\n\nPACING STRATEGY:\nYour freestyle intervals should be challenging but not all-out. You should be\nable to maintain form and complete all 6 x 25m. This is about consistency.\n\nTOTAL POOL TIME:\nYou'll spend approximately 25 minutes in the water, including warm-up and\ncool-down. This is a solid session that doesn't exceed your 30-40 minute\ntarget window once you account for changing time.\n\nHYDRATION:\nEven though you're in water, you still need to hydrate. Drink water before\nentering the pool and immediately after exiting. Your body loses fluids even\nwhile swimming.\n\nCHLORINE CONSIDERATIONS:\nRinse off afterward to remove chlorine. This is especially good for your skin\nand hair. It also removes the smell from your clothes if you let chlorine dry\non fabric.\n\nPROGRESSION:\nWeek 3 will increase some of these distances. Week 2's job is to establish\nbaseline fitness and comfort in the water.\n\nYOU'RE A SWIMMER NOW!\nSwimming is one of the best whole-life fitness activities. Your body is learning\na new skill while getting incredibly fit. That's powerful.\n\n================================================================================\nWEEK 2 WRAP-UP\n================================================================================\n\nYou've completed a full week of progressive overload:\n- Day 8 (Monday): Full body gym with increased sets/weights\n- Day 9 (Tuesday): Dedicated mobility and recovery\n- Day 10 (Wednesday): Kettlebell and band training at home\n- Day 11 (Thursday): Extra recovery with neck focus\n- Day 12 (Friday): Swimming for cardiovascular fitness\n\nThis is exactly what a well-designed training week looks like: hard work + smart\nrecovery = progress.\n\nWeekend is a light recovery period, then Week 3 brings more progression. You're\nbuilding real, lasting fitness.\n\nEXCELLENT WORK THIS WEEK!\nYour consistency, effort, and willingness to try new activities (like swimming)\nis exactly what creates transformation. You should be proud.\n\n================================================================================\n", "day_of_week": "Fri", "date": "Feb21", "workout_type": "Pool Swimming"}, "13": {"filename": "Day_13_Sat_Feb22_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 13 | Saturday, February 22, 2026 | Rest Day - Active Recovery\n================================================================================\n\nPROFILE REMINDER\n- Rest days are crucial for recovery and adaptation\n- All movements should feel easy and comfortable\n- No heavy exertion - focus on tissue quality and mobility\n- If any stretch causes sharp pain, stop and consult a healthcare provider\n- Active recovery means light movement, not training\n\nWEEK 2 REST DAY PROTOCOL - ACTIVE RECOVERY\nSaturday is your penultimate rest day of Week 2. After five intense training days\n(Mon/Wed/Fri structured workouts plus two mobility-focused rest days), your body\nis in a prime adaptation phase. This Saturday combines an easy walk with a full\nstretching routine - what we call \"active recovery.\"\n\nActive recovery is NOT rest in the traditional sense. It's light movement that:\n- Increases blood flow (which aids nutrient delivery and waste removal)\n- Maintains mobility gains from previous stretching sessions\n- Keeps your metabolic rate elevated slightly without adding training stress\n- Prepares your body for final rest day (Sunday)\n- Improves recovery markers and reduces soreness\n\nYou've earned this. Enjoy the movement.\n\n================================================================================\nACTIVE RECOVERY WALK (15 minutes)\n================================================================================\n\nWALK PROTOCOL:\nDuration: 15 minutes of easy walking\nIntensity: 2-3 out of 10 RPE (very easy, conversational pace)\nLocation: Outdoor preferred (fresh air, vitamin D, mental health benefits) but\n          treadmill walk is acceptable if weather is poor\n\nWALK GUIDELINES:\n- Walk at a pace where you could easily have a conversation\n- No sprinting or intervals - this is purely about movement and blood flow\n- Swing your arms naturally to engage upper body\n- Keep posture upright (shoulders back, core engaged)\n- Breathe deeply and steadily\n\nMENTAL BENEFITS:\nWalking at this easy pace provides mental recovery as much as physical recovery.\nYour nervous system gets a break from training stress. Your brain gets fresh air\nand stimulus (if outdoors). This is therapy.\n\nWALK STRUCTURE (Suggestions):\nOption 1 (Outdoor): 15-minute loop walk around your neighborhood\nOption 2 (Treadmill): 15 minutes at 2.5-3.0 mph, flat terrain\nOption 3 (Nature): If possible, a walk in a park or natural setting. Extra\n                   benefits for mental health.\n\nNO TRACKING NEEDED:\nDon't worry about distance, pace, or calories. Just walk at a comfortable pace\nfor 15 minutes. This is recovery, not training.\n\nFORM CUES FOR WALKING:\n- Shoulders relaxed, not hunched\n- Core engaged but not braced\n- Natural arm swing\n- Land heel-first, push off with forefoot\n- Look ahead, not down at phone\n\nVIDEO REFERENCE:\nhttps://www.youtube.com/results?search_query=proper+walking+posture+form+tutorial\n\n================================================================================\nFULL BODY STRETCHING ROUTINE (15 minutes following walk)\n================================================================================\n\nThis stretching routine should be done immediately after your walk while muscles\nare still warm from movement. Total duration: approximately 15 minutes.\n\nNECK & SHOULDER SECTION (3 minutes)\n========================\n\n1. Gentle Neck Circles\n   Reps: 5 circles each direction\n   Form Cue: Sit or stand upright. Slowly drop chin toward chest, roll to one\n             shoulder, then the other. Reverse direction. Smooth continuous\n             motion at 50% normal speed.\n   Notes: Begins neck recovery work\n   Video: https://www.youtube.com/results?search_query=neck+circles+mobility+tutorial\n\n2. Neck Lateral Stretch\n   Duration: 30 seconds each side\n   Form Cue: Sit upright, gently pull head toward one shoulder using opposite\n             hand. Keep shoulders relaxed.\n   Notes: Your primary neck limitation gets priority\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n3. Upper Trapezius Stretch\n   Duration: 30 seconds each side\n   Form Cue: Use one hand to pull head toward opposite shoulder at 45-degree\n             angle. Feel stretch in back-side of neck.\n   Notes: Compound neck and shoulder stretch\n   Video: https://www.youtube.com/results?search_query=upper+trapezius+stretch+form+tutorial\n\n4. Shoulder Rolls\n   Reps: 10 forward, 10 backward\n   Form Cue: Roll shoulders up, back, down, forward. Emphasize backward roll.\n   Notes: Maintains shoulder mobility\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+mobility+tutorial\n\n5. Chest Doorway Stretch\n   Duration: 30 seconds, 2 sets\n   Form Cue: Forearm on doorway frame at 90 degrees. Step through until you\n             feel chest stretch.\n   Notes: Counteracts forward posture\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\nSPINE & CORE SECTION (3 minutes)\n========================\n\n6. Cat-Cow Stretch (Dynamic)\n   Reps: 12 repetitions\n   Form Cue: On hands and knees. Alternate between arching back (cow) and\n             rounding spine (cat). Move with your breath.\n   Notes: Mobilizes entire spine\n   Video: https://www.youtube.com/results?search_query=cat+cow+yoga+stretch+tutorial\n\n7. Supine Spinal Twist\n   Duration: 45 seconds each side\n   Form Cue: Lying on back, bring knee across body. Keep shoulder blades down.\n   Notes: Gently rotates spine, aids digestion\n   Video: https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+tutorial\n\n8. Child's Pose\n   Duration: 60 seconds\n   Form Cue: Knees apart, sink hips back to heels, arms extended forward. Rest\n             forehead.\n   Notes: Restorative, calming\n   Video: https://www.youtube.com/results?search_query=child+pose+yoga+stretch+tutorial\n\nHIP & LEG SECTION (5 minutes)\n========================\n\n9. Hip Flexor Stretch (Low Lunge)\n   Duration: 45 seconds each side, 2 sets\n   Form Cue: Half-kneeling, press hips forward. Keep torso upright.\n   Notes: Critical for your sitting lifestyle\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+low+lunge+tutorial\n\n10. Hamstring Stretch\n    Duration: 45 seconds each leg, 2 sets\n    Form Cue: Seated or standing, reach toward toes gently.\n    Notes: Tight hamstrings common after swimming\n    Video: https://www.youtube.com/results?search_query=hamstring+stretch+form+tutorial\n\n11. Figure-4 Glute Stretch\n    Duration: 45 seconds each side, 2 sets\n    Form Cue: Lying on back, cross one ankle over opposite knee. Pull bottom\n              leg toward chest.\n    Notes: Deep hip opener\n    Video: https://www.youtube.com/results?search_query=figure+4+glute+stretch+form+tutorial\n\n12. Thread the Needle Stretch\n    Duration: 30 seconds each side\n    Form Cue: Lying on back, right ankle on left knee (figure-4). Pull left\n              knee toward chest.\n    Notes: Variation on figure-4, good for symmetry\n    Video: https://www.youtube.com/results?search_query=thread+the+needle+stretch+form+tutorial\n\n13. Pigeon Pose\n    Duration: 60 seconds each side\n    Form Cue: Bring knee behind wrist, flex foot, lower hips slowly. Keep chest\n              up.\n    Notes: Intense hip opener. You can lean forward for more intensity or stay\n           upright if needed. Breathe through sensation.\n    Video: https://www.youtube.com/results?search_query=pigeon+pose+yoga+tutorial\n\nCOOL-DOWN SECTION (2 minutes)\n========================\n\n14. World's Greatest Stretch\n    Reps: 3 per side\n    Form Cue: Step forward into lunge, place hands down, rotate open, reach arm\n              up. Step back.\n    Notes: Full-body mobility\n    Video: https://www.youtube.com/results?search_query=world's+greatest+stretch+tutorial\n\n15. Extended Child's Pose (Final)\n    Duration: 90 seconds\n    Form Cue: Knees apart, hips sink back, arms extended forward. Breathe\n              deeply and relax completely.\n    Notes: Peaceful, grounding finish\n    Video: https://www.youtube.com/results?search_query=child+pose+yoga+stretch+tutorial\n\n================================================================================\nRECOVERY NOTES FOR SATURDAY\n================================================================================\n\nHOW YOU SHOULD FEEL:\nAfter five training days, you may notice:\n- General fatigue (normal, body is adapting)\n- Some residual muscle soreness from Monday and Wednesday\n- Mental tiredness (training creates nervous system fatigue too)\n- Possibly elevated resting heart rate (sign your body is working hard to recover)\n\nAll of this is normal. This walk and stretching session helps manage all of it.\n\nHYDRATION & NUTRITION:\nContinue drinking plenty of water. Eat adequate protein. Your body is still\nin recovery/adaptation mode. Nutrition matters more during recovery phases than\nduring training phases.\n\nSLEEP QUALITY:\nYou may sleep deeper tonight. That's your body telling you it needs recovery.\nListen to it. Aim for 8+ hours if possible.\n\nSORENESS MANAGEMENT:\nYour Friday swim may have created soreness in muscles that weren't as taxed\nby strength training (stabilizers, aerobic muscles). This is good - different\nstimulus creates balanced adaptation.\n\nMENTAL STATE:\nActive recovery isn't just physical. Getting outside, moving gently, and\nstretching have profound mental health benefits. Notice how you feel after\nthis session.\n\nTOMORROW:\nTomorrow is FULL REST. No structured activity. Just light stretching if you\nwant. Your job tomorrow is to rest, recover, and prepare for Week 3.\n\nYOU'RE CRUSHING WEEK 2!\nYou've trained hard, rested smart, and are actively managing recovery. This\nis the foundation of long-term progress. You're doing everything right.\n\n================================================================================\nQUICK REFERENCE: SATURDAY AT A GLANCE\n================================================================================\n\nMorning/Afternoon:\n- 15-minute easy walk (outdoor preferred)\n- 15-minute full-body stretching routine\n- Total time: approximately 30-35 minutes\n\nThat's it. Simple, effective, restorative.\n\nThe combination of movement + stretching + recovery focus is exactly what your\nbody needs at this point in Week 2.\n\nENJOY THIS DAY.\nYou've earned it through your hard work this week.\n\n================================================================================\n", "day_of_week": "Sat", "date": "Feb22", "workout_type": "Stretching Mobility"}, "14": {"filename": "Day_14_Sun_Feb23_Rest.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 14 | Sunday, February 23, 2026 | Full Rest Day\n================================================================================\n\nPROFILE REMINDER\n- Full rest day means no structured training or mobility work\n- Light, optional stretching only if you feel like it\n- This is mental and physical recovery time\n- Stay hydrated and well-nourished\n- Quality sleep is priority\n\nWEEK 2 COMPLETION\nCongratulations. You've completed Week 2 of your fitness journey. This is a\ngenuine accomplishment.\n\nWeek 2 Summary:\n- Monday: Full body gym session with progressive overload\n- Tuesday: Dedicated mobility and recovery\n- Wednesday: Home kettlebell and band training\n- Thursday: Extra neck/shoulder recovery work\n- Friday: Swimming for cardiovascular fitness and different stimulus\n- Saturday: Active recovery walk and stretching\n- Sunday: Full rest (today)\n\nYou've done the work. Now let your body repair and adapt.\n\n================================================================================\nTODAY'S PROTOCOL\n================================================================================\n\nOPTION 1 (RECOMMENDED): FULL COMPLETE REST\nDuration: 24 hours with zero structured activity\nWhat to do: Live your normal Sunday. Spend time with family/friends. Eat good\n            food. Hydrate. Rest. Enjoy life.\nWhat NOT to do: Don't think about workouts. Don't worry about fitness. Your\n                job today is to be a human, not an athlete.\n\nOPTION 2 (IF YOU MUST MOVE): VERY LIGHT STRETCHING ONLY\nIf you feel stiff or want to move, 5-10 minutes of light stretching is okay:\n- Gentle neck stretches (2 minutes)\n- Easy hip flexor stretch (1 minute each side)\n- Light hamstring stretch (1 minute each leg)\n- Child's pose (2 minutes)\n\nThat's it. Keep it minimal. This is just for people who feel uncomfortably\nstiff. Most people should skip this entirely and just rest.\n\nDO NOT:\n- Do a \"light workout\"\n- Go for a walk (today is rest, Saturday was active recovery)\n- Do exercises\n- Do cardio\n- Do any structured physical activity\n- Think too hard about training\n\n================================================================================\nRECOVERY SCIENCE - WHY FULL REST MATTERS\n================================================================================\n\nYOUR BODY'S ADAPTATION CYCLE:\nTraining creates stimulus → Body adapts during recovery → You get stronger\n\nIf you never give your body recovery, you never get adaptation. Full rest days\nare when the magic happens. This is not laziness. This is performance.\n\nWHAT HAPPENS DURING COMPLETE REST:\n\n1. Muscle Protein Synthesis\n   Your body is actively building muscle tissue and repairing micro-damage\n   from training. This process accelerates during rest.\n\n2. Hormonal Optimization\n   Cortisol (stress hormone) levels normalize. Testosterone and growth hormone\n   levels rebalance. These adaptations require complete rest, not light activity.\n\n3. Nervous System Recovery\n   Your central nervous system has been working hard managing five training\n   days. Today it fully recovers, improving next week's performance.\n\n4. Energy System Replenishment\n   Your muscles' energy reserves (glycogen, creatine phosphate) fully replenish.\n   Your aerobic capacity recovers.\n\n5. Immune System Restoration\n   Training creates temporary immune suppression. Rest restores it.\n\nSIX REASONS TO FULLY REST TODAY:\n\n1. Reduced Injury Risk\n   Overtraining increases injury risk. You prevent this with full rest days.\n\n2. Better Performance Next Week\n   Week 3 will be even more challenging. You need full recovery to handle it.\n\n3. Mental Recovery\n   Your brain needs a break. Constant training creates mental fatigue.\n\n4. Hormonal Balance\n   Your body needs deep rest to balance hormone levels properly.\n\n5. Immune Health\n   Training stress suppresses immunity temporarily. Complete rest restores it.\n\n6. Preventing Overtraining Syndrome\n   This is real and serious. Full rest days prevent it.\n\n================================================================================\nDOMS (DELAYED ONSET MUSCLE SORENESS) NOTES\n================================================================================\n\nYou may experience DOMS (muscle soreness) today, particularly from:\n- Monday's gym session (typically peaks Day 2-3, so Friday or Saturday)\n- Wednesday's kettlebell work (peaks around Day 3-4, so Friday or Saturday)\n- Friday's swimming (peaks around Day 2-3, so Saturday or Sunday)\n\nDOMS is completely normal and indicates:\n- Your body is adapting to new stimulus\n- Muscle tissue is repairing and building\n- You're making progress\n\nDOMS is NOT:\n- Injury\n- A sign something went wrong\n- A reason to avoid training next week\n\nMANAGING DOMS:\n- Light movement reduces it (which is why Saturday's walk helps)\n- Stretching helps but doesn't eliminate it\n- Heat (warm shower) provides temporary relief\n- Time is the actual cure (3-7 days typically)\n- Hydration and protein intake help\n- Ibuprofen if it's severe, but avoid unless necessary\n\nDOMS SHOULD IMPROVE:\nBy Week 3, you'll experience less DOMS because your body has adapted to\nstrength training. This adaptation is exactly what we want.\n\n================================================================================\nHYDRATION & NUTRITION TODAY\n================================================================================\n\nHYDRATION:\nContinue your normal water intake. Your body still needs this for recovery.\nAim for about half your body weight in ounces daily (100 oz for you).\n\nNUTRITION PRIORITIES:\n\nProtein:\nYour muscles need protein to repair. Aim for 150-220g today (0.7-1g per lb\nof body weight). You don't need to track precisely - just eat adequate\nprotein at meals.\n- Excellent sources: chicken, fish, beef, eggs, Greek yogurt, cottage cheese,\n  legumes, protein powder\n\nCarbohydrates:\nYour glycogen stores were depleted by training. Replenish them. Carbs are\nyour friend on rest days.\n- Excellent sources: rice, potatoes, oats, bread, pasta, fruits, vegetables\n\nFats:\nHealthy fats support hormone production and recovery.\n- Excellent sources: olive oil, nuts, avocados, fish, butter, coconut oil\n\nMicronutrients:\nVegetables and fruits provide micronutrients needed for recovery.\n- Eat a colorful diet\n\nDO NOT:\n- Restrict calories today\n- Go on a diet\n- Eat too little\n- Skip meals\n\nYour body needs fuel to recover from the training stress you've created.\n\nEXAMPLE REST DAY NUTRITION:\nBreakfast: Eggs, toast, orange juice\nLunch: Chicken, rice, vegetables\nSnack: Greek yogurt with granola\nDinner: Steak, potatoes, salad\n\nThis provides protein, carbs, fats, and micronutrients. Keep it simple.\n\n================================================================================\nSLEEP TONIGHT\n================================================================================\n\nSleep is when most of your adaptation happens. Prioritize it.\n\nTARGET: 8 hours of quality sleep\n\nSLEEP HYGIENE TIPS:\n- Go to bed at a consistent time\n- Wake up at a consistent time (even on weekends)\n- Sleep in a cool, dark room (60-67°F is ideal)\n- No screens 30 minutes before bed\n- Avoid caffeine after 2pm\n- Avoid heavy meals 3 hours before bed\n- Consider a relaxing activity before bed (reading, light stretching)\n\nYOUR BODY WILL THANK YOU:\nQuality sleep directly improves:\n- Recovery speed\n- Performance next week\n- Muscle growth\n- Fat loss\n- Mental clarity\n- Immune function\n- Mood and mental health\n\nDon't skip this. Sleep is training.\n\n================================================================================\nMENTAL GAME & REFLECTION\n================================================================================\n\nACKNOWLEDGE YOUR PROGRESS:\nYou've now completed two full weeks of training. That's 14 days of consistency.\nMost people quit before Day 5. You're not most people.\n\nWHAT YOU'VE ACCOMPLISHED:\n- Built a training routine\n- Learned proper form on multiple exercises\n- Experienced multiple training modalities (gym, kettlebells, swimming)\n- Developed a stretching/mobility practice\n- Managed recovery like a serious athlete\n- Showed up even on days you didn't feel like it\n\nThis is the foundation of everything. Consistency beats perfection.\n\nWHAT TO EXPECT GOING FORWARD:\n\nWeek 3:\n- Slightly heavier weights\n- Same exercise selection\n- Continued progression\n- Your body will feel more adapted\n\nWeek 4:\n- More noticeable improvements\n- Clothes fit differently potentially\n- Better energy levels\n- Stronger, faster, more capable\n\nMonth 2-3:\n- Significant strength gains\n- Body composition changes\n- Improved mobility and posture\n- Genuine fitness\n\nThis is a multi-month process. You're building lasting change, not looking\nfor quick fixes.\n\nWEEK 2 REFLECTION:\n\nTake a moment today to think about:\n1. How did your body feel during training?\n2. Which workouts did you enjoy most?\n3. How's your neck mobility improving?\n4. What's changed in how you feel?\n5. What's working well?\n6. What adjustments do you want to make for Week 3?\n\nThese reflections help you stay engaged and make the program your own.\n\n================================================================================\nTOMORROW: WEEK 3 BEGINS\n================================================================================\n\nMonday (Week 3, Day 15) will bring:\n- Slightly heavier weights on gym movements\n- Continued progression\n- The same structure you've now mastered\n\nYou're ready. You've proven you can do this.\n\n================================================================================\nFINAL THOUGHTS\n================================================================================\n\nREST IS NOT LAZINESS.\n\nRest is where your body adapts to training. Rest is where you get stronger,\nfaster, and more fit. Rest is part of training.\n\nToday, do absolutely nothing related to fitness:\n- Don't think about your workouts\n- Don't check your progress\n- Don't plan future training\n- Don't obsess over nutrition\n- Just live\n\nEnjoy your Sunday. You've earned it.\n\nYou're not just building fitness - you're building a lifestyle. That takes\ntime, consistency, and smart recovery.\n\nWEEK 2 IS COMPLETE.\n\nExcellent work. Really, genuinely excellent work.\n\nSee you Monday for Week 3.\n\n================================================================================\n\nQUICK REFERENCE: SUNDAY AT A GLANCE\n================================================================================\n\nDO:\n- Rest completely\n- Drink water\n- Eat nutritious food\n- Sleep 8+ hours\n- Enjoy your life\n- Reflect on your progress\n\nDON'T:\n- Workout\n- Do structured stretching\n- Go for walks\n- Track calories obsessively\n- Stress about fitness\n\nTHAT'S IT.\n\nYou've done the work. Now let your body do the adaptation.\n\n================================================================================\n", "day_of_week": "Sun", "date": "Feb23", "workout_type": "Rest"}}, "3": {"15": {"filename": "Day_15_Mon_Feb24_Full_Body_Gym.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 3\n================================================================================\nDay 15 | Monday, February 24, 2026 | Full Body Gym Session\n================================================================================\n\nPROFILE REMINDER\n- Goal: Build strength, lose fat, improve overall fitness\n- Keep rest between sets: 60 seconds\n- RPE: Aim for 7 out of 10 (slightly more challenging this week)\n- If any exercise causes pain (not just discomfort), STOP and skip it\n- Stay hydrated\n\n--------------------------------------------------------------------------------\nWARM-UP (5 minutes)\n--------------------------------------------------------------------------------\n1. Treadmill walk - 3 minutes at comfortable pace (3.5-4.5 mph)\n   Video: https://www.youtube.com/results?search_query=treadmill+walking+proper+form+tutorial\n\n2. Dynamic stretches - 2 minutes\n   - Leg swings (10 each direction, each leg)\n   - Arm circles (10 forward, 10 backward)\n   - Torso twists (10 each side)\n   Video: https://www.youtube.com/results?search_query=dynamic+stretches+before+workout+tutorial\n\n--------------------------------------------------------------------------------\nMAIN WORKOUT\n--------------------------------------------------------------------------------\nExercise 1: Goblet Squat\n  Sets: 3 | Reps: 12 | Weight: 25lb kettlebell\n  Notes: Hold kettlebell at chest. Descend slowly, knees tracking over toes. Full depth is ideal.\n  Video: https://www.youtube.com/results?search_query=goblet+squat+form+tutorial\n\nExercise 2: Lat Pulldown\n  Sets: 3 | Reps: 12 | Weight: Increase ~5lb from last week\n  Notes: Pull bar to upper chest. Control the return. Keep torso upright.\n  Video: https://www.youtube.com/results?search_query=lat+pulldown+form+tutorial\n\nExercise 3: Leg Press\n  Sets: 3 | Reps: 12 | Weight: Increase from last week\n  Notes: Full range of motion. Don't lock knees at top. Push through heels.\n  Video: https://www.youtube.com/results?search_query=leg+press+form+tutorial\n\nExercise 4: Chest Press Machine\n  Sets: 3 | Reps: 12 | Weight: Continue from Week 2\n  Notes: Sit upright. Push directly forward. Control the return phase.\n  Video: https://www.youtube.com/results?search_query=chest+press+machine+form+tutorial\n\nExercise 5: Seated Cable Row\n  Sets: 3 | Reps: 12 | Weight: Continue from Week 2\n  Notes: Pull elbows back. Squeeze shoulder blades. Return to starting position with control.\n  Video: https://www.youtube.com/results?search_query=seated+cable+row+form+tutorial\n\nExercise 6: Dumbbell Shoulder Press (NEW EXERCISE)\n  Sets: 2 | Reps: 10 | Weight: 15lb each hand\n  Notes: Sit upright. Press dumbbells overhead with control. This is a new movement for you!\n  Video: https://www.youtube.com/results?search_query=dumbbell+shoulder+press+form+tutorial\n\nExercise 7: Cable Face Pull (NEW EXERCISE)\n  Sets: 2 | Reps: 12 | Weight: Light weight (start low)\n  Notes: Great for neck health! Pull rope toward forehead/behind head. Elbows high.\n  Video: https://www.youtube.com/results?search_query=cable+face+pull+form+tutorial\n\nExercise 8: Plank\n  Sets: 3 | Reps: 30 seconds | No weight\n  Notes: Keep body straight from head to heels. Engage your core. Breathe steadily.\n  Video: https://www.youtube.com/results?search_query=proper+plank+form+tutorial\n\n--------------------------------------------------------------------------------\nCOOL-DOWN & STRETCHING (5 minutes)\n--------------------------------------------------------------------------------\n1. Light walk on treadmill - 2 minutes\n2. Full body stretching routine:\n   - Chest stretch (30 sec each side)\n   - Quad stretch (30 sec each leg)\n   - Hamstring stretch (30 sec each leg)\n   - Shoulder/lat stretch (30 sec each side)\n   Video: https://www.youtube.com/results?search_query=full+body+stretching+routine+tutorial\n\n================================================================================\nNOTES\n================================================================================\nGreat work on Week 3! You've added 2 new exercises today:\n- Dumbbell Shoulder Press: This builds shoulder strength and stability\n- Cable Face Pull: Excellent for neck health and upper back strength - perfect for your stiff neck\n\nYou're progressing well. Remember: if any weight feels too heavy, drop down 5lb - this is about form first, then adding weight. Rest 60 seconds between all sets.\n\nCheck-in: How are you feeling about the gym sessions? Any exercises giving you more confidence?\n", "day_of_week": "Mon", "date": "Feb24", "workout_type": "Full Body Gym"}, "16": {"filename": "Day_16_Tue_Feb25_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 3\n================================================================================\nDay 16 | Tuesday, February 25, 2026 | Rest Day - Stretching & Mobility\n================================================================================\n\nPROFILE REMINDER\n- Active recovery helps reduce soreness and improves flexibility\n- Perform this routine in the morning and evening\n- Move slowly through stretches. Hold each 30-45 seconds\n- Breathe deeply and stay relaxed\n- This is NOT a workout - keep intensity very light\n\n--------------------------------------------------------------------------------\nMORNING ROUTINE (10-15 minutes)\n--------------------------------------------------------------------------------\n\n1. Neck Stretches (because of your stiff neck concern!)\n   - Gentle neck flexion: Slowly tilt chin toward chest (30 sec)\n   - Neck extension: Gently tilt head back (30 sec) - be careful!\n   - Neck rotation: Turn head slowly side to side (30 sec each)\n   - Lateral neck flexion: Tilt ear toward shoulder (30 sec each)\n   Video: https://www.youtube.com/results?search_query=gentle+neck+stretches+stiffness+relief+tutorial\n\n2. Shoulder & Trap Stretches\n   - Shoulder rolls: Slow, controlled 10 forward, 10 backward\n   - Cross-body shoulder stretch: (30 sec each arm)\n   - Trap stretch: Tilt head and pull (30 sec each side)\n   Video: https://www.youtube.com/results?search_query=shoulder+trap+stretches+tutorial\n\n3. Chest Opening\n   - Doorway chest stretch: Hold 45 seconds each side\n   - Supine chest stretch: Lie on foam roller or towel (45 sec)\n   Video: https://www.youtube.com/results?search_query=chest+opening+stretches+tutorial\n\n4. Spine Mobility\n   - Seated spinal twist: (30 sec each side)\n   - Cat-cow stretch: 10-12 slow repetitions\n   - Child's pose: Hold 60 seconds, breathe deeply\n   Video: https://www.youtube.com/results?search_query=spine+mobility+stretches+tutorial\n\n5. Lower Body Stretches\n   - Standing quad stretch: (30 sec each leg)\n   - Standing hamstring stretch: (30 sec each leg)\n   - Hip flexor lunge: (30 sec each side) - very important after sitting\n   - Pigeon pose: (45 sec each side)\n   Video: https://www.youtube.com/results?search_query=hip+and+hamstring+stretches+tutorial\n\n6. Full Body Cool-Down\n   - Forward fold: Hold 60 seconds, let gravity work\n   - Lay on back and hug knees: 30 seconds\n   Video: https://www.youtube.com/results?search_query=full+body+forward+fold+stretching+tutorial\n\n--------------------------------------------------------------------------------\nEVENING ROUTINE (10-15 minutes)\n--------------------------------------------------------------------------------\nRepeat the morning routine at night to promote recovery and relaxation before bed.\n\nFocus especially on:\n- Neck stretches (gentle, slow)\n- Hip flexor stretches (your sedentary lifestyle makes these tigh
