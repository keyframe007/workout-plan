    <script>
        // Workout data will be injected here
        const workoutData = {"overview": "================================================================================\n                    ALI'S 4-WEEK FOUNDATION PROGRAM\n                        Complete Program Overview\n================================================================================\n\nPROGRAM NAME: Ali's 4-Week Foundation Program\nDURATION: 4 weeks (28 days)\nDATES: February 24 - March 9, 2026\nSTATUS: Comprehensive beginner workout program with progressive overload\n\n================================================================================\nUSER PROFILE\n================================================================================\n\nNAME: Ali\n\nPERSONAL STATS:\n- Age: 47 years old\n- Weight: 100 kg (220 lbs)\n- Height: 1.82 m (5'11\")\n- Lifestyle: Previously sedentary, returning to exercise after extended time off\n- Experience Level: Beginner / Deconditioned\n\nPRIMARY GOALS:\n✓ Build strength\n✓ Lose fat\n✓ Improve overall fitness\n✓ Develop sustainable exercise habits\n\nSPECIFIC LIMITATION:\n- Stiff neck from prolonged sitting at desk\n- Requires daily stretching and mobility work\n- Special attention to neck health throughout program\n\nAVAILABLE EQUIPMENT:\n- Adjustable kettlebells (5-35 lbs)\n- Resistance bands (light, medium, heavy)\n- Full gym access (machines, free weights, cardio equipment)\n- Swimming pool access\n\nSCHEDULE AVAILABILITY:\n- 3 structured workouts per week: Monday, Wednesday, Friday\n- Daily stretching on rest days\n- Total session duration: 30-40 minutes per workout\n\n================================================================================\nWEEKLY SCHEDULE OVERVIEW\n================================================================================\n\nMONDAY: Full Body Gym Session\n- Focus: Machines + free weights (dumbbell introduction)\n- Duration: 35-40 minutes\n- Intensity: Moderate-High\n- Muscles: All major groups\n\nTUESDAY: Rest Day - Stretching & Mobility\n- Activity Type: Flexibility + active recovery\n- Duration: 20-30 minutes (morning + evening routine)\n- Intensity: Very Low\n- Focus: Flexibility development, stress relief\n\nWEDNESDAY: Kettlebell & Bands (Home Workout)\n- Focus: Kettlebell + resistance bands (functional strength)\n- Duration: 35-40 minutes\n- Intensity: Moderate-High\n- Muscles: Full body, emphasis on posterior chain + core\n\nTHURSDAY: Rest Day - Stretching & Mobility\n- Activity Type: Flexibility + active recovery\n- Duration: 20-30 minutes\n- Intensity: Very Low\n- Focus: Recovery, neck health (special attention)\n\nFRIDAY: Pool / Swimming\n- Focus: Conditioning + low-impact strength\n- Duration: 30 minutes\n- Intensity: Moderate-High\n- Muscles: Full body, especially cardiovascular system\n\nSATURDAY: Active Recovery Day\n- Activity Type: Light movement + stretching\n- Duration: 30 minutes (walk + flexibility)\n- Intensity: Very Low\n- Focus: Promote recovery, maintain movement\n\nSUNDAY: Full Rest Day\n- Activity Type: Complete rest + reflection\n- Duration: Light stretching optional (5-10 min)\n- Intensity: Zero (recovery day)\n- Focus: Physical recovery, mental celebration\n\nTOTAL WEEKLY STRUCTURE:\n- Intense Workouts: 3 days\n- Stretching/Mobility Days: 2 full days\n- Active Recovery: 1 day\n- Complete Rest: 1 day\n\n================================================================================\n4-WEEK PROGRESSION SUMMARY\n================================================================================\n\nWEEK 1 (Feb 24 - Mar 2): Foundation Building\n┌─────────────────────────────────────────────────────────────────────────┐\n│ Focus: Establish baseline fitness, learn proper form, build consistency │\n├─────────────────────────────────────────────────────────────────────────┤\n│ Sets per Exercise: 2 sets                                               │\n│ Reps per Set: 10-12 reps (hypertrophy range)                            │\n│ Kettlebell Weight: 15 lb                                                │\n│ Rest Between Sets: 60-90 seconds                                        │\n│ Main Exercises: Kettlebell swings, goblet squats, gym machines          │\n│ Special Notes: Light introduction, priority on form mastery            │\n│ Goal: Adapt to structured training, establish habit                    │\n└─────────────────────────────────────────────────────────────────────────┘\n\nWEEK 2 (Mar 3-9, 2026): Volume Increase\n┌─────────────────────────────────────────────────────────────────────────┐\n│ Focus: Increase work volume, slight weight progression                  │\n├─────────────────────────────────────────────────────────────────────────┤\n│ Sets per Exercise: 2-3 sets                                             │\n│ Reps per Set: 10-12 reps (maintained for endurance)                     │\n│ Kettlebell Weight: 20 lb (5 lb increase)                                │\n│ Rest Between Sets: 60-90 seconds                                        │\n│ Main Exercises: Previous exercises + added variations                   │\n│ Special Notes: Feel adaptations, less soreness, better recovery         │\n│ Goal: Build capacity, increase consistency, adapt to volume             │\n└─────────────────────────────────────────────────────────────────────────┘\n\nWEEK 3 (Mar 10-16, 2026): Intensity & Exercise Variation\n┌─────────────────────────────────────────────────────────────────────────┐\n│ Focus: Maintain volume, introduce new exercises, increase intensity     │\n├─────────────────────────────────────────────────────────────────────────┤\n│ Sets per Exercise: 3 sets                                               │\n│ Reps per Set: 10-12 reps (strength-hypertrophy range)                   │\n│ Kettlebell Weight: 20-25 lb (progressive)                               │\n│ Rest Between Sets: 60 seconds                                           │\n│ New Exercises: Cable face pulls, new kettlebell variations              │\n│ Special Notes: Real strength building beginning, form is solid          │\n│ Goal: Add complexity, test max capacity, build strength foundation      │\n└─────────────────────────────────────────────────────────────────────────┘\n\nWEEK 4 (Mar 17-23, 2026): Challenge Week - Progressive Overload\n┌─────────────────────────────────────────────────────────────────────────┐\n│ Focus: MAXIMUM VOLUME, power output, introduce free weights             │\n├─────────────────────────────────────────────────────────────────────────┤\n│ Sets per Exercise: 3 sets                                               │\n│ Reps per Set: 12-15 reps (high volume, conditioning focus)              │\n│ Kettlebell Weight: 25 lb (5 lb max increase)                            │\n│ Rest Between Sets: 45-60 seconds (SHORTER = conditioning boost!)        │\n│ Free Weights Introduced: Dumbbell bench press, dumbbell shoulder press  │\n│ New Exercises: Band Pallof Press (anti-rotation core), sprint swimming  │\n│ Special Notes: FINAL WEEK - push yourself! Highest intensity!           │\n│ Goal: Complete foundation phase strong, ready for Month 2 progression   │\n└─────────────────────────────────────────────────────────────────────────┘\n\nPROGRESSION VISUAL:\n```\nWeek 1  Week 2  Week 3  Week 4\nVolume  ▄       ▆       █       █      (3 sets by Week 3-4)\nReps    ▄       ▄       ▄       █      (12-15 reps in Week 4)\nWeight  ▄       ▆       █       █      (20-25lb kettlebell)\nRest    ▄       ▄       ▆       █      (45-60 sec in Week 4)\n```\n\n================================================================================\nEQUIPMENT NEEDED\n================================================================================\n\nESSENTIAL (Must Have):\n□ Adjustable kettlebells: 15 lb, 20 lb, 25 lb minimum\n  - Alternative: Two separate kettlebells (5, 15, 25 preferred)\n  - Used for: Swings, goblet squats, floor press, rows, shoulder press\n\n□ Resistance bands: Light, medium, heavy\n  - Used for: Pull-aparts, Pallof press, assisted pull-ups\n  - Cost-effective, versatile, excellent for bands work\n\n□ Full gym access\n  - Machines: Leg press, lat pulldown, cable row, cable machine\n  - Dumbbells: 10-25 lbs (for pressing movements)\n  - Equipment: Treadmill, bench (optional)\n\n□ Swimming pool\n  - Used for: Friday conditioning sessions, low-impact training\n  - Great for: Cardiovascular work, full-body conditioning, recovery\n\nOPTIONAL (Nice to Have):\n□ Foam roller: for self-massage and recovery\n□ Yoga mat: for floor work and stretching\n□ Workout bench: for dumbbell pressing (can use floor)\n□ Pull-up bar: for advanced progressions in Month 2+\n□ Timer/stopwatch: for interval training\n□ Water bottle: for hydration during workouts\n\nACTUAL COST:\n- Kettlebells: $100-150 (one-time)\n- Resistance bands: $20-30 (one-time)\n- Gym membership: $30-100/month (varies)\n- Pool access: Often included in gym membership\n\nTOTAL STARTUP: $150-300 + monthly gym fees\n\n================================================================================\nIMPORTANT SAFETY NOTES\n================================================================================\n\nMEDICAL CLEARANCE:\n⚠️ CRITICAL: Consult your doctor before starting this program\n  - You're 47 years old, previously sedentary\n  - Any pre-existing conditions? Discuss with doctor\n  - Take medical advice seriously - it overrides everything here\n  - This program assumes you're cleared for moderate exercise\n\nPAIN VS. DISCOMFORT:\nKnow the difference - this is CRITICAL:\n\nDISCOMFORT (Safe - Continue):\n✓ Muscle burn during set (lactate burn)\n✓ General fatigue after workout\n✓ Muscle soreness 24-48 hours post-workout (DOMS)\n✓ Mild tightness in muscles\n✓ Heavy breathing during intense effort\n→ These are NORMAL and mean you're working\n\nPAIN (Unsafe - STOP Immediately):\n✗ Sharp, piercing pain during movement\n✗ Shooting pain down limb\n✗ Joint pain (especially knees, shoulders, back)\n✗ Pain that doesn't go away after rest\n✗ Severe acute injuries (tears, strains)\n→ STOP the exercise immediately\n→ Consult doctor or physical therapist\n\nIF IN DOUBT: STOP AND REST\n- Better to be conservative than injured\n- Injury = weeks/months of setback\n- Your health > this program\n\nFORM IS CRITICAL:\n- Perfect form at low weight > sloppy form at high weight\n- Take time to learn proper technique\n- YouTube videos provided for EVERY exercise\n- Record yourself or ask trainer to check form\n- Bad form = injury risk, lower effectiveness\n\nPROGRESSION MUST BE GRADUAL:\n- Week 4 uses 25lb kettlebells (we earned this!)\n- Never jump weight 5+ pounds\n- Add reps before adding weight\n- Listen to your body\n- Patience = long-term success\n\nHYDRATION & NUTRITION:\n- Drink water BEFORE, DURING, AFTER workouts\n- Don't train completely fasted\n- Eat carbs + protein within 2 hours post-workout\n- Proper fueling = better recovery = faster progress\n\nREST IS PART OF TRAINING:\n- Rest days are NOT failures\n- Your muscles grow during rest, not during workouts\n- Overtraining = injury risk\n- Sleep 7-9 hours per night\n- This program includes strategic rest\n\nWARM-UP & COOL-DOWN:\n- 5-minute warm-up every session (non-negotiable)\n- 5-minute cool-down/stretching every session\n- Jumping into heavy weights cold = injury\n- Proper warm-up = better performance, fewer injuries\n\nLISTEN TO YOUR BODY:\n- Some days you'll feel stronger than others\n- Persistent fatigue = take an extra rest day\n- Catching a cold? Take a break, recover\n- Mental health matters = rest if stressed/depressed\n- This program is a guide, not a prison\n\nNECK SPECIAL CARE:\n- Your primary limitation: stiff neck from sitting\n- Daily stretching addresses this\n- Don't force neck stretches - gentle work is better\n- If neck pain increases, reduce intensity, see professional\n- This program prioritizes your neck health!\n\n================================================================================\nNUTRITION GUIDELINES\n================================================================================\n\nCALORIE APPROACH:\nFor fat loss at your stats (47yo, 100kg, sedentary→active):\n- Estimated daily calories: 2,200-2,500 without exercise\n- With 3x/week training: 2,500-2,800 calories\n- For fat loss: 300-500 calorie deficit = 0.5-1 lb/week loss\n- Target: Gradual fat loss (2-4 lbs/month) while building strength\n- Don't crash diet (lose muscle, no energy for training)\n\nMACRONUTRIENT TARGETS (approximate):\n\nPROTEIN (Critical for muscle recovery):\n- Target: 0.8-1.0g per pound of body weight\n- Your target: 80-100g protein per day minimum\n- At 100kg (220 lbs): 175-220g protein daily\n- Sources: Chicken, fish, eggs, Greek yogurt, cottage cheese, protein powder\n- Timing: Protein at each meal (distribute across day)\n\nCARBOHYDRATES (Energy for training):\n- Target: 40-50% of calories\n- At 2,500 cal: 250-300g carbs daily\n- Timing: Before and after workouts\n- Sources: Oats, rice, potatoes, pasta, fruits, bread, vegetables\n- Choose whole grains when possible\n\nHEALTHY FATS (Hormone function):\n- Target: 20-30% of calories\n- At 2,500 cal: 55-85g fats daily\n- Sources: Olive oil, avocado, nuts, fatty fish, eggs\n- Include omega-3 fatty acids (salmon, mackerel, sardines)\n\nHYDRATION (Often overlooked!):\n- Target: 3-4 liters water per day minimum\n- More if training intensely\n- Proper hydration = better performance, faster recovery\n- Drink consistently throughout day (not all at once)\n\nSAMPLE DAILY MEAL STRUCTURE:\n\nBREAKFAST:\n- 3 eggs + 1 slice whole grain toast + 1 banana\n- Protein: 20g, Carbs: 30g, Fat: 10g\n- Alternative: Oatmeal with berries and Greek yogurt\n\nMIDDAY SNACK:\n- Apple + 2 oz almonds\n- Protein: 6g, Carbs: 25g, Fat: 14g\n- Alternative: String cheese + fruit\n\nLUNCH:\n- 6 oz grilled chicken + 1 cup brown rice + 1 cup broccoli\n- Protein: 45g, Carbs: 45g, Fat: 5g\n- Alternative: Ground turkey sandwich on whole grain\n\nPRE-WORKOUT (30-60 min before training):\n- 1 banana + 1 tbsp peanut butter\n- Protein: 8g, Carbs: 30g, Fat: 9g\n- Alternative: Small bowl of oatmeal\n\nPOST-WORKOUT (within 2 hours):\n- 6 oz salmon + 8 oz sweet potato + salad with olive oil\n- Protein: 45g, Carbs: 40g, Fat: 15g\n- Alternative: Protein shake with banana and oats\n\nSNACK/DINNER:\n- 2% Greek yogurt with berries\n- Protein: 15g, Carbs: 20g, Fat: 0g\n- Or: Lean ground beef tacos with whole grain tortillas\n\nIMPORTANT NOTES:\n- Meal timing flexibility: above is a GUIDE, not rigid\n- Calories matter more than timing (usually)\n- But post-workout nutrition does help recovery\n- Whole foods > processed (generally better)\n- Alcohol: Keep moderate (empty calories)\n- Sugar: Minimize but don't eliminate\n- One \"cheat\" meal per week is fine (consistency matters more)\n\nSUPPLEMENTATION (Optional):\n- Protein powder: Convenient, not necessary if eating enough protein\n- Creatine monohydrate: Proven safe, helps strength gains, inexpensive\n- Multivitamin: Insurance policy, not a replacement for food\n- Omega-3 fish oil: Helps inflammation, joint health\n- Bcaa/EAA: Unnecessary if eating protein regularly\n\nReality: 80% of results come from diet consistency, 20% from supplements\n\n================================================================================\nSLEEP & RECOVERY IMPORTANCE\n================================================================================\n\nWHY SLEEP MATTERS FOR FITNESS:\n\nDuring sleep, your body:\n✓ Repairs muscle tissue damaged during workouts\n✓ Releases growth hormone (muscle building!)\n✓ Consolidates memory (learns skills, form)\n✓ Regulates metabolism and hunger hormones\n✓ Recovers from mental/physical stress\n✓ Immune system strengthens\n✓ Fat loss happens during sleep!\n\nSLEEP TARGETS:\n- Minimum: 7 hours per night\n- Optimal: 7-9 hours per night\n- Track current sleep: Are you getting enough?\n\nSLEEP QUALITY OPTIMIZATION:\n□ Consistent sleep schedule (same bedtime + wake time)\n□ Dark, cool bedroom (65-68°F optimal)\n□ No screens 30-60 minutes before bed\n□ Avoid caffeine after 2 PM\n□ Avoid large meals 2-3 hours before bed\n□ Light stretching before bed (helps calm nervous system)\n□ Meditation/breathing exercises (5-10 minutes)\n\nPOOR SLEEP CONSEQUENCES:\n✗ Slower recovery from workouts\n✗ Increased injury risk\n✗ Lower strength and power output\n✗ Increased hunger hormones (more cravings)\n✗ Slower fat loss\n✗ Lower mood and motivation\n✗ Weakened immune system\n\nPRIORITIZE SLEEP AS MUCH AS TRAINING!\n\nOne great night of sleep beats many supplements.\nSleep is where your body builds muscle.\nWithout sleep, your workout gains are wasted.\n\n================================================================================\nFILE STRUCTURE & ORGANIZATION\n================================================================================\n\nDIRECTORY LAYOUT:\n\nWorkout Plan/\n├── Program_Overview.txt (this file)\n│\n├── Week_1/\n│   ├── Day_01_Mon_Feb24_Full_Body_Gym.txt\n│   ├── Day_02_Tue_Feb25_Stretching_Mobility.txt\n│   ├── Day_03_Wed_Feb26_Kettlebell_Bands_Home.txt\n│   ├── Day_04_Thu_Feb27_Stretching_Mobility.txt\n│   ├── Day_05_Fri_Feb28_Pool_Swimming.txt\n│   ├── Day_06_Sat_Mar01_Stretching_Mobility.txt\n│   └── Day_07_Sun_Mar02_Rest.txt\n│\n├── Week_2/\n│   ├── Day_08_Mon_Mar03_Full_Body_Gym.txt\n│   ├── Day_09_Tue_Mar04_Stretching_Mobility.txt\n│   ├── Day_10_Wed_Mar05_Kettlebell_Bands_Home.txt\n│   ├── Day_11_Thu_Mar06_Stretching_Mobility.txt\n│   ├── Day_12_Fri_Mar07_Pool_Swimming.txt\n│   ├── Day_13_Sat_Mar08_Stretching_Mobility.txt\n│   └── Day_14_Sun_Mar09_Rest.txt\n│\n├── Week_3/\n│   ├── Day_15_Mon_Mar10_Full_Body_Gym.txt\n│   ├── Day_16_Tue_Mar11_Stretching_Mobility.txt\n│   ├── Day_17_Wed_Mar12_Kettlebell_Bands_Home.txt\n│   ├── Day_18_Thu_Mar13_Stretching_Mobility.txt\n│   ├── Day_19_Fri_Mar14_Pool_Swimming.txt\n│   ├── Day_20_Sat_Mar15_Stretching_Mobility.txt\n│   └── Day_21_Sun_Mar16_Rest.txt\n│\n└── Week_4/\n    ├── Day_22_Mon_Mar03_Full_Body_Gym.txt\n    ├── Day_23_Tue_Mar04_Stretching_Mobil =====\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- Keep rest between sets: 60-90 seconds\n- Rate of Perceived Exertion (RPE): Aim for 6-7 out of 10\n- If any exercise causes pain (not just discomfort), STOP and skip it\n- Stay hydrated - drink water before, during, and after\n- NECK NOTE: Perform slow, controlled movements; skip or modify if neck pain occurs\n\n--------------------------------------------------------------------------------\nWARM-UP (5 minutes)\n--------------------------------------------------------------------------------\n\n1. Treadmill Walk\n   Duration: 3 minutes at brisk pace (you should be able to talk but not sing)\n   Video: https://www.youtube.com/results?search_query=treadmill+walking+proper+form+beginners\n\n2. Arm Circles\n   Reps: 10 each direction (forward and backward)\n   Notes: Keep arms extended, make smooth circles\n   Video: https://www.youtube.com/results?search_query=arm+circles+exercise+form\n\n3. Leg Swings\n   Reps: 10 each leg, each direction (forward/back and side-to-side)\n   Notes: Hold onto a stable object for balance; keep movements controlled\n   Video: https://www.youtube.com/results?search_query=leg+swings+exercise+form+tutorial\n\n--------------------------------------------------------------------------------\nMAIN WORKOUT\n--------------------------------------------------------------------------------\n\nExercise 1: Goblet Squat (Kettlebell)\n  Sets: 2 | Reps: 10 | Weight: 15lb kettlebell\n  Notes: Hold kettlebell at chest level, elbows pointing down. Squat as if sitting back into a chair. Keep chest up, knees tracking over toes. Full range of motion.\n  Video: https://www.youtube.com/results?search_query=goblet+squat+kettlebell+form+tutorial\n  Rest: 60-90 seconds between sets\n\nExercise 2: Lat Pulldown (Machine)\n  Sets: 2 | Reps: 12 | Weight: Start ~40-50lb (light), adjust to moderate effort\n  Notes: Sit upright, grip shoulder-width apart. Pull bar down to upper chest, control the return. Engage your lats (sides of back), not just arms.\n  Video: https://www.youtube.com/results?search_query=lat+pulldown+machine+form+tutorial\n  Rest: 60-90 seconds between sets\n\nExercise 3: Leg Press Machine\n  Sets: 2 | Reps: 12 | Weight: Start ~90lb plate load, adjust to feel challenging\n  Notes: Sit with back and head against pad. Place feet shoulder-width apart, mid-foot placement. Lower until knees reach 90 degrees, do not lock knees at top.\n  Video: https://www.youtube.com/results?search_query=leg+press+machine+form+tutorial+beginners\n  Rest: 60-90 seconds between sets\n\nExercise 4: Chest Press Machine\n  Sets: 2 | Reps: 12 | Weight: Start ~40-50lb (light), adjust as needed\n  Notes: Sit upright with back against pad. Grip handles at chest level. Push straight forward without locking elbows. Controlled return.\n  Video: https://www.youtube.com/results?search_query=chest+press+machine+form+tutorial\n  Rest: 60-90 seconds between sets\n\nExercise 5: Seated Cable Row\n  Sets: 2 | Reps: 12 | Weight: Start ~40-50lb (light), adjust to moderate effort\n  Notes: Sit upright, chest against pad if available. Row toward your torso, squeezing shoulder blades together. Control the return without hunching forward.\n  Video: https://www.youtube.com/results?search_query=seated+cable+row+form+tutorial\n  Rest: 60-90 seconds between sets\n\nExercise 6: Plank (Core)\n  Sets: 2 | Duration: 20 seconds each set\n  Notes: On forearms and toes (or knees if needed). Body in straight line from head to heels. Engage core, don't let hips sag. Breathe steadily.\n  Video: https://www.youtube.com/results?search_query=plank+exercise+proper+form+tutorial\n  Rest: 60 seconds between sets\n\n--------------------------------------------------------------------------------\nCOOL-DOWN & STRETCHING (5 minutes)\n--------------------------------------------------------------------------------\n\n1. Slow Treadmill Walk\n   Duration: 2 minutes at easy pace\n   Notes: Let your heart rate come down gradually\n   Video: https://www.youtube.com/results?search_query=cool+down+walking+exercise\n\n2. Neck Lateral Stretch\n   Duration: 30 seconds each side\n   Notes: Gently tilt ear toward shoulder; do not force. Breathe slowly and deeply.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n3. Neck Forward Flexion Stretch\n   Duration: 30 seconds\n   Notes: Gently lower chin toward chest without forcing\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n4. Chest Doorway Stretch\n   Duration: 30 seconds each side\n   Notes: Place forearm/palm on door frame. Step through until you feel gentle chest stretch. Keep shoulders relaxed.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n5. Standing Hamstring Stretch\n   Duration: 30 seconds each side\n   Notes: Place heel on bench or step, slight forward fold. Keep knee straight but not locked. Feel stretch in back of thigh.\n   Video: https://www.youtube.com/results?search_query=standing+hamstring+stretch+form+tutorial\n\n6. Child's Pose\n   Duration: 30 seconds\n   Notes: On knees, drop hips back toward heels, arms extended forward. Feel gentle stretch in back and shoulders.\n   Video: https://www.youtube.com/results?search_query=childs+pose+stretching+tutorial\n\n================================================================================\nNOTES\n================================================================================\n\nWelcome to Week 1 - Foundation Week!\nThis is your first structured workout back into fitness. Take it easy and focus on:\n\n- FORM FIRST: Use lighter weight than you think you need. Proper form is more important than heavy weight.\n- LISTEN TO YOUR BODY: Some muscle soreness in 24-48 hours is normal (DOMS). Sharp pain is not.\n- NECK CARE: You mentioned a stiff neck from sitting. Take extra care with the neck stretches and stop any exercise if it aggravates your neck.\n- HYDRATION: Drink plenty of water today and tomorrow.\n- NEXT STEP: You have stretching and mobility work tomorrow (Day 2). This active recovery is crucial for adaptation.\n\nYou've got this! Consistency over intensity is the goal for Week 1.\n\n================================================================================", "day_of_week": "Mon", "date": "Feb10", "workout_type": "Full Body Gym"}, "2": {"filename": "Day_02_Tue_Feb11_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 1\n================================================================================\nDay 2 | Tuesday, February 11 | Rest Day - Stretching & Mobility Focus\n================================================================================\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- This is an ACTIVE RECOVERY day - light stretching and mobility work only\n- No heavy lifting today; your muscles are adapting from Monday's workout\n- Rate of Perceived Exertion (RPE): 1-2 out of 10 (gentle, relaxing)\n- You may experience muscle soreness (DOMS) - stretching helps reduce it\n- NECK PRIORITY: Extra focus on neck and shoulder mobility today\n\n--------------------------------------------------------------------------------\nMORNING ROUTINE (10-15 minutes)\n--------------------------------------------------------------------------------\nPerform each stretch slowly and hold the full duration. Breathe deeply throughout.\nDo not bounce or force any stretch. You should feel mild tension, not pain.\n\n1. Neck Lateral Stretch\n   Duration: 30 seconds each side (left, then right)\n   Notes: Gently tilt ear toward shoulder. Keep shoulders relaxed down.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n2. Neck Forward Flexion Stretch\n   Duration: 30 seconds\n   Notes: Slowly lower chin toward chest. Feel stretch in back of neck.\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n3. Upper Trap Stretch\n   Duration: 30 seconds each side\n   Notes: Reach right arm over head, gently pull head toward right shoulder. Feel stretch on left side of neck.\n   Video: https://www.youtube.com/results?search_query=upper+trapezius+stretch+form+tutorial\n\n4. Levator Scapulae Stretch\n   Duration: 30 seconds each side\n   Notes: Look toward floor at 45-degree angle, gently pull head forward and down. Feel stretch in upper trap.\n   Video: https://www.youtube.com/results?search_query=levator+scapulae+stretch+form+tutorial\n\n5. Chest Doorway Stretch\n   Duration: 30 seconds each side\n   Notes: Place forearm on door frame, step through gently until you feel chest stretch. Keep shoulder relaxed.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n6. Cat-Cow Stretch\n   Reps: 10 repetitions (controlled, flowing movements)\n   Notes: On hands and knees. Arch back and lift gaze (cow), then round spine and tuck chin (cat). Move slowly with breath.\n   Video: https://www.youtube.com/results?search_query=cat+cow+stretch+yoga+form+tutorial\n\n7. Thread the Needle (Thoracic Rotation)\n   Reps: 8 each side\n   Notes: On hands and knees, thread right arm under left side of body, rest on shoulder. Feel twist in upper back. Repeat other side.\n   Video: https://www.youtube.com/results?search_query=thread+the+needle+stretch+thoracic+rotation+tutorial\n\n8. Hip Flexor Stretch (Half-Kneeling)\n   Duration: 30 seconds each side\n   Notes: Half-kneeling position, front knee bent at 90 degrees. Gently press hips forward. Feel stretch in front of back leg's hip.\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+half+kneeling+form+tutorial\n\n9. Standing Hamstring Stretch\n   Duration: 30 seconds each side\n   Notes: Place heel on bench or step (knee straight but not locked). Slight forward fold from hips. Feel stretch in back of thigh.\n   Video: https://www.youtube.com/results?search_query=standing+hamstring+stretch+form+tutorial\n\n10. Figure-4 Glute Stretch (Supine)\n    Duration: 30 seconds each side\n    Notes: Lying on back, right ankle crosses over left knee (figures a \"4\"). Pull left knee toward chest. Feel stretch in right glute.\n    Video: https://www.youtube.com/results?search_query=figure+4+stretch+supine+form+tutorial\n\n11. Child's Pose\n    Duration: 60 seconds\n    Notes: On knees, drop hips back toward heels, arms extended forward. Rest your forehead. Feel gentle stretch throughout back and shoulders.\n    Video: https://www.youtube.com/results?search_query=childs+pose+stretching+tutorial\n\n--------------------------------------------------------------------------------\nEVENING ROUTINE (5-10 minutes)\n--------------------------------------------------------------------------------\nLight mobility work to wind down before bed.\n\n1. Gentle Neck Circles\n   Reps: 5 each direction (forward, right, back, left - slowly!)\n   Notes: Slow, controlled movements. Do not force full circles if neck feels tight.\n   Video: https://www.youtube.com/results?search_query=gentle+neck+circles+exercise+tutorial\n\n2. Shoulder Rolls\n   Reps: 10 forward, 10 backward\n   Notes: Slow, smooth movements. Feel your shoulders release tension.\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+exercise+form+tutorial\n\n3. World's Greatest Stretch\n   Reps: 5 each side\n   Notes: Lunge forward, rotate torso toward front leg, reach arm overhead. Full-body mobility. Move slow and controlled.\n   Video: https://www.youtube.com/results?search_query=worlds+greatest+stretch+tutorial\n\n4. Pigeon Pose\n   Duration: 30 seconds each side\n   Notes: Right leg bent in front, left leg extended behind. Fold forward gently. Feel stretch in right glute and hip.\n   Video: https://www.youtube.com/results?search_query=pigeon+pose+yoga+stretch+tutorial\n\n5. Supine Spinal Twist\n   Duration: 30 seconds each side\n   Notes: Lying on back, right knee crosses toward left side, head turns right. Feel gentle stretch in right side and lower back.\n   Video: https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+tutorial\n\n================================================================================\nNOTES\n================================================================================\n\nToday is all about RECOVERY. Your muscles from Monday are adapting, and this mobility work:\n- Reduces muscle soreness (DOMS)\n- Improves circulation and flexibility\n- Prepares your body for Wednesday's session\n- Gives your neck special attention (critical for a desk worker returning to fitness)\n\nWHAT TO EXPECT:\n- Some muscle soreness is completely normal and expected (24-48 hours post-workout)\n- Light stretching actually helps reduce soreness\n- You may feel more flexible and loose after today's routine\n\nHYDRATION & NUTRITION:\n- Continue drinking plenty of water\n- Eat a balanced meal with protein to support muscle recovery\n- Get good sleep tonight - recovery happens during rest\n\nTOMORROW (WEDNESDAY):\n- You'll have another gym session with kettlebells and bands at home\n- You'll be stronger after a rest day - trust the process!\n\nYou're doing great! Rest days are just as important as workout days.\n\n================================================================================", "day_of_week": "Tue", "date": "Feb11", "workout_type": "Stretching Mobility"}, "3": {"filename": "Day_03_Wed_Feb12_Kettlebell_Bands_Home.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 1\n================================================================================\nDay 3 | Wednesday, February 12 | Kettlebell & Bands (Home Session)\n================================================================================\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- Keep rest between sets: 60-90 seconds\n- Rate of Perceived Exertion (RPE): Aim for 6-7 out of 10\n- If any exercise causes pain (not just discomfort), STOP and skip it\n- Stay hydrated - drink water before, during, and after\n- NECK NOTE: Avoid excessive neck rotation in kettlebell swings; keep head neutral\n\n--------------------------------------------------------------------------------\nWARM-UP (5 minutes)\n--------------------------------------------------------------------------------\n\n1. March in Place\n   Duration: 1 minute\n   Notes: Warm up your heart rate and get blood flowing. Steady, controlled pace.\n   Video: https://www.youtube.com/results?search_query=marching+in+place+warm+up+exercise\n\n2. Arm Circles\n   Reps: 30 seconds forward, 30 seconds backward\n   Notes: Full range of motion, smooth and controlled circles\n   Video: https://www.youtube.com/results?search_query=arm+circles+exercise+form\n\n3. Bodyweight Squats\n   Reps: 10 reps\n   Notes: Feet shoulder-width apart, sit back as if into a chair. Full range of motion.\n   Video: https://www.youtube.com/results?search_query=bodyweight+squat+form+tutorial+beginners\n\n4. Hip Circles\n   Reps: 10 each direction (clockwise and counterclockwise)\n   Notes: Hands on hips, make slow, large circles. Mobilize the hip joint.\n   Video: https://www.youtube.com/results?search_query=hip+circles+mobility+exercise+tutorial\n\n--------------------------------------------------------------------------------\nMAIN WORKOUT\n--------------------------------------------------------------------------------\n\nExercise 1: Kettlebell Swing (Two-Handed)\n  Sets: 2 | Reps: 10 | Weight: 15lb kettlebell\n  Notes: Hold kettlebell with both hands, feet shoulder-width apart. Hip hinge (bend at hips, not knees), swing kettlebell between legs, explosively drive hips forward to bring kettlebell to chest height. Keep chest up, head neutral. Controlled return.\n  Video: https://www.youtube.com/results?search_query=kettlebell+swing+form+tutorial+beginners\n  Rest: 60-90 seconds between sets\n\nExercise 2: Push-Ups (From Knees if Needed)\n  Sets: 2 | Reps: 8 reps\n  Notes: Hands under shoulders, body in straight line from head to knees (or toes if you can do full push-ups). Lower until chest nearly touches floor, push back up. If knees are uncomfortable, place towel under knees. Full range of motion.\n  Video: https://www.youtube.com/results?search_query=push+up+form+tutorial+beginners\n  Rest: 60-90 seconds between sets\n\nExercise 3: Kettlebell Single-Arm Row\n  Sets: 2 | Reps: 10 each arm | Weight: 15lb kettlebell\n  Notes: Staggered stance, kettlebell on ground between legs. Row kettlebell toward hip, driving elbow back and squeezing shoulder blade. Control the return to ground. Switch sides. Keep torso stable, don't rotate.\n  Video: https://www.youtube.com/results?search_query=kettlebell+single+arm+row+form+tutorial\n  Rest: 60-90 seconds between sets (total, both arms)\n\nExercise 4: Band Pull-Apart\n  Sets: 2 | Reps: 12 | Equipment: Light resistance band\n  Notes: Stand upright, hold band at shoulder height with arms extended in front. Pull band apart by contracting shoulder blades, arms end in \"T\" position. Controlled return. Feel band resistance throughout movement.\n  Video: https://www.youtube.com/results?search_query=band+pull+apart+exercise+form+tutorial\n  Rest: 60-90 seconds between sets\n\nExercise 5: Kettlebell Sumo Deadlift\n  Sets: 2 | Reps: 10 | Weight: 20lb kettlebell\n  Notes: Feet wider than shoulder-width, toes slightly out. Kettlebell on ground between feet. Hip hinge, grab kettlebell handle. Drive through heels and straighten legs to standing. Shoulders back, chest up. Controlled return to ground.\n  Video: https://www.youtube.com/results?search_query=kettlebell+sumo+deadlift+form+tutorial\n  Rest: 60-90 seconds between sets\n\nExercise 6: Dead Bug (Core)\n  Sets: 2 | Reps: 8 each side\n  Notes: Lie on back, arms extended toward ceiling, knees bent at 90 degrees (shins parallel to floor). Slowly extend right arm overhead while extending left leg straight, return to start. Alternate sides. Keep lower back on floor throughout.\n  Video: https://www.youtube.com/results?search_query=dead+bug+core+exercise+form+tutorial\n  Rest: 60 seconds between sets\n\n--------------------------------------------------------------------------------\nCOOL-DOWN & STRETCHING (5 minutes)\n--------------------------------------------------------------------------------\n\n1. Neck Lateral Stretch\n   Duration: 30 seconds each side (left, then right)\n   Notes: Gently tilt ear toward shoulder. This is especially important after kettlebell work.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n2. Neck Forward Flexion Stretch\n   Duration: 30 seconds\n   Notes: Gently lower chin toward chest without forcing\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n3. Hip Flexor Stretch (Half-Kneeling)\n   Duration: 30 seconds each side\n   Notes: Half-kneeling position, front knee bent at 90 degrees. Gently press hips forward. Feel stretch in front of hip.\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+half+kneeling+form+tutorial\n\n4. Standing Hamstring Stretch\n   Duration: 30 seconds each side\n   Notes: Place heel on bench or step (knee straight but not locked). Slight forward fold. Feel stretch in back of thigh.\n   Video: https://www.youtube.com/results?search_query=standing+hamstring+stretch+form+tutorial\n\n5. Child's Pose\n   Duration: 30 seconds\n   Notes: On knees, drop hips back toward heels, arms extended forward. Rest your forehead. Full-body release.\n   Video: https://www.youtube.com/results?search_query=childs+pose+stretching+tutorial\n\n================================================================================\nNOTES\n================================================================================\n\nDay 3 - Kettlebell & Bands Session Complete!\n\nWHAT HAPPENED TODAY:\n- You're diversifying your training with kettlebells and resistance bands\n- This session focuses on functional, full-body strength\n- Kettlebell swings and sumo deadlifts engage your posterior chain (back, glutes, hamstrings)\n- Push-ups and rows build chest, back, and arm strength\n- This variation keeps your body adapting and prevents boredom\n\nFORM TIPS:\n- Kettlebell swings should feel like a powerful hip thrust, not an arm lift\n- If your home doesn't have a lot of space, that's fine - all these exercises can be done in a small area\n- Single-arm rows require core stability - don't let your torso rotate\n\nHYDRATION & NUTRITION:\n- You've done 2 full workouts now (Monday + Wednesday). Your body is working hard!\n- Drink plenty of water and eat protein-rich foods\n- You may notice increased appetite - that's normal and expected\n\nTOMORROW (THURSDAY):\n- Another stretching and mobility day with a neck focus\n- Your muscles will continue adapting\n- This is when most of your strength gains happen - during recovery!\n\nYou're building momentum. Two workouts down, one more this week. Let's finish strong!\n\n================================================================================", "day_of_week": "Wed", "date": "Feb12", "workout_type": "Kettlebell Bands Home"}, "4": {"filename": "Day_04_Thu_Feb13_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 1\n================================================================================\nDay 4 | Thursday, February 13 | Rest Day - Stretching & Mobility (Neck Focus)\n================================================================================\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- This is an ACTIVE RECOVERY day - light stretching and mobility work only\n- No heavy lifting today; your muscles are recovering from Wednesday's session\n- Rate of Perceived Exertion (RPE): 1-2 out of 10 (gentle, relaxing)\n- NECK PRIORITY: Extra focus today on neck and shoulder mobility due to your stiff neck concern\n\n================================================================================\nNECK RECOVERY SECTION (5 minutes - DO THIS FIRST)\n================================================================================\nYour neck has been under stress from your sedentary lifestyle. This section targets\nneck and upper shoulder recovery. Do these FIRST before other stretches.\n\n1. Chin Tucks\n   Reps: 10 repetitions (hold 5 seconds each)\n   Notes: Standing or sitting upright. Gently retract your chin (like making a double chin), hold 5 seconds. This strengthens neck stabilizers. Very important for desk workers.\n   Video: https://www.youtube.com/results?search_query=chin+tucks+neck+exercise+tutorial\n\n2. Neck Lateral Stretch with Gentle Hand Assist\n   Duration: 30 seconds each side (left, then right)\n   Notes: Gently tilt ear toward shoulder, then use opposite hand to gently assist the stretch (not force). Breathe deeply. Feel gentle tension.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+with+hand+assist+tutorial\n\n3. Levator Scapulae Stretch\n   Duration: 30 seconds each side\n   Notes: Look toward floor at 45-degree angle, gently pull head forward and down with hand. Feel stretch in upper trap/neck.\n   Video: https://www.youtube.com/results?search_query=levator+scapulae+stretch+form+tutorial\n\n4. Shoulder Shrugs\n   Reps: 10 repetitions (hold 3 seconds at top)\n   Notes: Standing upright, slowly raise shoulders toward ears, hold 3 seconds, release slowly. This mobilizes the shoulder girdle.\n   Video: https://www.youtube.com/results?search_query=shoulder+shrugs+exercise+tutorial\n\n================================================================================\nMORNING ROUTINE (10-15 minutes)\n================================================================================\nPerform each stretch slowly and hold the full duration. Breathe deeply throughout.\nDo not bounce or force any stretch. You should feel mild tension, not pain.\n\n1. Neck Lateral Stretch\n   Duration: 30 seconds each side (left, then right)\n   Notes: Gently tilt ear toward shoulder. Keep shoulders relaxed down away from ears.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n2. Neck Forward Flexion Stretch\n   Duration: 30 seconds\n   Notes: Slowly lower chin toward chest. Feel gentle stretch in back of neck.\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n3. Upper Trap Stretch\n   Duration: 30 seconds each side\n   Notes: Reach right arm over head, gently pull head toward right shoulder. Feel stretch on left side of neck/shoulder.\n   Video: https://www.youtube.com/results?search_query=upper+trapezius+stretch+form+tutorial\n\n4. Levator Scapulae Stretch\n   Duration: 30 seconds each side\n   Notes: Look toward floor at 45-degree angle, gently pull head forward and down. Feel stretch in upper trap.\n   Video: https://www.youtube.com/results?search_query=levator+scapulae+stretch+form+tutorial\n\n5. Chest Doorway Stretch\n   Duration: 30 seconds each side\n   Notes: Place forearm/palm on door frame, step through gently until you feel chest stretch. Important counterstretch to kettlebell work.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n6. Cat-Cow Stretch\n   Reps: 10 repetitions (controlled, flowing movements)\n   Notes: On hands and knees. Arch back and lift gaze (cow), then round spine and tuck chin (cat). Move slowly with breath.\n   Video: https://www.youtube.com/results?search_query=cat+cow+stretch+yoga+form+tutorial\n\n7. Thread the Needle (Thoracic Rotation)\n   Reps: 8 each side\n   Notes: On hands and knees, thread right arm under left side of body, rest on shoulder. Feel twist in upper back/thoracic spine.\n   Video: https://www.youtube.com/results?search_query=thread+the+needle+stretch+thoracic+rotation+tutorial\n\n8. Hip Flexor Stretch (Half-Kneeling)\n   Duration: 30 seconds each side\n   Notes: Half-kneeling position, front knee bent at 90 degrees. Gently press hips forward. Feel stretch in front of hip.\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+half+kneeling+form+tutorial\n\n9. Standing Hamstring Stretch\n   Duration: 30 seconds each side\n   Notes: Place heel on bench or step (knee straight but not locked). Slight forward fold from hips. Feel stretch in back of thigh.\n   Video: https://www.youtube.com/results?search_query=standing+hamstring+stretch+form+tutorial\n\n10. Figure-4 Glute Stretch (Supine)\n    Duration: 30 seconds each side\n    Notes: Lying on back, right ankle crosses over left knee. Pull left knee toward chest. Feel stretch in right glute and hip.\n    Video: https://www.youtube.com/results?search_query=figure+4+stretch+supine+form+tutorial\n\n11. Child's Pose\n    Duration: 60 seconds\n    Notes: On knees, drop hips back toward heels, arms extended forward. Rest your forehead. Feel gentle stretch in back and shoulders.\n    Video: https://www.youtube.com/results?search_query=childs+pose+stretching+tutorial\n\n================================================================================\nEVENING ROUTINE (5-10 minutes)\n================================================================================\nLight mobility work to wind down before bed.\n\n1. Gentle Neck Circles\n   Reps: 5 each direction (forward, right, back, left - slowly!)\n   Notes: Slow, controlled movements. Do not force full circles if neck feels tight. This is therapeutic mobility work.\n   Video: https://www.youtube.com/results?search_query=gentle+neck+circles+exercise+tutorial\n\n2. Shoulder Rolls\n   Reps: 10 forward, 10 backward\n   Notes: Slow, smooth movements. Feel your shoulders release tension from sitting and training.\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+exercise+form+tutorial\n\n3. World's Greatest Stretch\n   Reps: 5 each side\n   Notes: Lunge forward, rotate torso toward front leg, reach arm overhead. Full-body mobility. Move slow and controlled.\n   Video: https://www.youtube.com/results?search_query=worlds+greatest+stretch+tutorial\n\n4. Pigeon Pose\n   Duration: 30 seconds each side\n   Notes: Right leg bent in front, left leg extended behind. Fold forward gently. Feel stretch in right glute and hip.\n   Video: https://www.youtube.com/results?search_query=pigeon+pose+yoga+stretch+tutorial\n\n5. Supine Spinal Twist\n   Duration: 30 seconds each side\n   Notes: Lying on back, right knee crosses toward left side, head turns right. Feel gentle stretch in side and lower back.\n   Video: https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+tutorial\n\n================================================================================\nNOTES\n================================================================================\n\nToday is NECK RECOVERY DAY!\n\nWHY FOCUS ON NECK TODAY:\n- You mentioned a stiff neck from a sedentary lifestyle - this is common and reversible\n- Wednesday's kettlebell work engaged your neck and upper back muscles\n- Dedicated mobility work helps restore range of motion and reduce stiffness\n- Chin tucks and levator scapulae stretches are especially important for you\n\nWHAT YOU'RE BUILDING:\n- Neck resilience through active recovery\n- Upper back mobility and strength\n- Prevention of future neck pain and stiffness\n- Better posture from your fitness work\n\nTHREE WORKOUTS DOWN!\nYou've completed:\n- Monday: Full body gym (6 exercises)\n- Wednesday: Kettlebells and bands (6 exercises)\n- Today: Mobility and stretching focus\n\nTOMORROW (FRIDAY):\n- You get to swim! This is a complete change of pace\n- Swimming is excellent for full-body conditioning without impact on joints\n- Your neck will thank you for the gentle aquatic movement\n\nYou're doing fantastic. Your body is adapting and getting stronger every day. Keep up the consistency!\n\n================================================================================", "day_of_week": "Thu", "date": "Feb13", "workout_type": "Stretching Mobility"}, "5": {"filename": "Day_05_Fri_Feb14_Pool_Swimming.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 1\n================================================================================\nDay 5 | Friday, February 14 | Pool / Swimming Session (Valentine's Day!)\n================================================================================\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- Swimming Note: You're comfortable swimming laps - this is perfect for Week 1\n- Rate of Perceived Exertion (RPE): Aim for 6-7 out of 10\n- Total Pool Time: 20-25 minutes\n- NECK NOTE: Water is therapeutic for neck! Swimming is excellent for your stiff neck concern\n\n================================================================================\nPRE-SWIM PREPARATION\n================================================================================\nArrive at the pool 5-10 minutes early to acclimate and prepare.\n\n1. Drink water before entering the pool\n   Notes: Hydration is important even though you'll be surrounded by water\n\n2. Use the bathroom before swimming (obvious, but important!)\n\n3. Gradual pool entry\n   Notes: Don't jump in cold. Wade in gradually to acclimate your body\n\n================================================================================\nWARM-UP (5 minutes - In the Water)\n================================================================================\n\n1. Gentle Neck Stretches (Poolside)\n   Duration: 2-3 minutes before entering water\n   Notes: Neck lateral stretches 30s each side, neck forward flex 30s - prepare your neck\n   Video: https://www.youtube.com/results?search_query=neck+stretches+poolside+water+exercise\n\n2. Arm Circles (Poolside)\n   Reps: 10 each direction\n   Notes: Loosen shoulders before entering water\n   Video: https://www.youtube.com/results?search_query=arm+circles+exercise+form\n\n3. Ankle Circles (Poolside)\n   Reps: 10 each direction per leg\n   Notes: Mobilize ankles before swimming\n   Video: https://www.youtube.com/results?search_query=ankle+circles+mobility+exercise\n\n4. Walk Length of Pool\n   Duration: At comfortable pace, full length (25m) or back and forth\n   Notes: Get familiar with depth, acclimate to water temperature, activate muscles\n   Video: https://www.youtube.com/results?search_query=pool+walking+warm+up+exercise\n\n================================================================================\nMAIN WORKOUT\n================================================================================\n\nExercise 1: Easy Freestyle Warm-Up Swim\n  Distance: 4 lengths (100m total, or 2 laps if your pool is 50m)\n  Pace: Comfortable, conversational pace (RPE 4-5 out of 10)\n  Notes: Focus on smooth, controlled strokes. This is not speed work - just building aerobic base. Steady breathing.\n  Video: https://www.youtube.com/results?search_query=freestyle+swimming+technique+beginner+tutorial\n  Rest: Take 30-45 seconds rest between every other length if needed\n\nExercise 2: Freestyle Intervals\n  Distance: 4 x 1 length (25m each)\n  Pace: Moderate effort (RPE 6-7 out of 10)\n  Notes: Swim 25m at moderate-to-strong pace, rest 30-45 seconds at wall. Repeat 4 times. This builds cardio and muscular endurance.\n  Video: https://www.youtube.com/results?search_query=freestyle+technique+form+tutorial+swimming\n  Rest: 30-45 seconds between each 25m repeat (active rest at wall)\n\nExercise 3: Breaststroke\n  Distance: 2 x 1 length (25m each)\n  Pace: Moderate effort (RPE 5-6 out of 10)\n  Notes: Different stroke variation. Breaststroke is easier on the shoulders and great for building lower body power. Focus on a strong kick.\n  Video: https://www.youtube.com/results?search_query=breaststroke+technique+beginner+form+tutorial\n  Rest: 30-45 seconds between the 2 repetitions\n\nExercise 4: Easy Continuous Swim\n  Distance: 5 minutes at comfortable pace\n  Pace: Easy (RPE 4-5 out of 10)\n  Notes: Any stroke. Just keep moving - freestyle, breaststroke, backstroke, whatever feels best. This is recovery swimming but still active work.\n  Video: https://www.youtube.com/results?search_query=swimming+strokes+tutorial+all+styles\n\nExercise 5: Treading Water\n  Duration: 2 x 30 seconds\n  Notes: Use legs and arms to stay afloat in deep water. This builds core and leg strength. Great for conditioning. Use arms to help initially if needed.\n  Video: https://www.youtube.com/results?search_query=treading+water+exercise+tutorial+swimming\n  Rest: 30-45 seconds easy swimming or walking in shallow end between repetitions\n\n================================================================================\nCOOL-DOWN & STRETCHING (5-10 minutes)\n================================================================================\nTake your time with cool-down. Let your heart rate come down gradually.\n\n1. Easy Backstroke or Sidestroke\n   Distance: 2 lengths (50m total)\n   Pace: Very easy (RPE 2-3 out of 10)\n   Notes: Backstroke is very gentle. Sidestroke uses different muscles. Both are excellent for cooling down and being easy on joints.\n   Video: https://www.youtube.com/results?search_query=backstroke+swimming+technique+beginner+tutorial\n\n2. Poolside Stretching\n   Duration: 5-10 minutes\n\n   a) Neck Lateral Stretch\n      Duration: 30 seconds each side\n      Notes: Gently in water or at poolside. Swimming is excellent therapy for neck.\n      Video: https://www.youtube.com/results?search_query=neck+stretch+in+pool+water+therapy\n\n   b) Shoulder/Chest Stretch\n      Duration: 30 seconds each side\n      Notes: Hold pool edge, gently pull body forward. Feel chest and shoulder stretch.\n      Video: https://www.youtube.com/results?search_query=shoulder+stretch+in+pool+exercise\n\n   c) Hip Flexor/Quad Stretch\n      Duration: 30 seconds each leg\n      Notes: Standing at pool edge, pull knee toward chest gently.\n      Video: https://www.youtube.com/results?search_query=hip+flexor+quad+stretch+pool+water\n\n   d) Hamstring Stretch\n      Duration: 30 seconds each leg\n      Notes: Place heel on pool edge (if possible), slight forward fold.\n      Video: https://www.youtube.com/results?search_query=hamstring+stretch+pool+edge+exercise\n\n3. Final Cool-Down Walk\n   Duration: 2-3 minutes at very easy pace\n   Notes: Walk slowly in shallow end to bring heart rate completely down\n\n================================================================================\nTOTAL POOL TIME: ~20-25 minutes\n================================================================================\n\nNOTES\n================================================================================\n\nSWIMMING IS AMAZING FOR YOU!\n\nWHY SWIMMING FOR WEEK 1:\n- ZERO IMPACT: No stress on joints. Perfect as you return to fitness at 47\n- LOW NECK STRESS: Water is therapeutic for your stiff neck. The buoyancy relieves compression\n- FULL-BODY WORK: Swimming engages every muscle group while being gentle\n- CARDIOVASCULAR: Great for heart health and fat loss without overloading joints\n- MENTAL BREAK: Swimming is meditative and stress-relieving - completely different than weights\n\nFORM TIPS:\n- Freestyle: Reach forward, catch water, pull down and back, push water behind you. Bilateral breathing is ideal (every 3 strokes)\n- Breaststroke: Extended glide phase. Kick is powerful (legs like frog). Great for building lower body power\n- Listen to your body - if any stroke bothers your neck, stop that stroke and focus on others\n\nTODAY'S STATS:\n- You've now completed 3 full workouts: Gym Monday, Home Wednesday, Swimming Friday\n- You've done 4 recovery/stretching days\n- You've covered all movement patterns: pushing, pulling, squatting, hinging, core, and low-impact cardio\n\nTOMORROW & SUNDAY:\n- Saturday: Another stretching day with a 10-minute walk\n- Sunday: Full rest day with very light activity only\n- Your body will be fully recovered by Monday for Week 2\n\nWHAT YOU'VE ACCOMPLISHED THIS WEEK:\n- Reestablished a consistent workout routine (3x/week)\n- Built a foundation of strength and mobility\n- Addressed your neck concerns with targeted stretches\n- Experienced different training modalities (gym, home, water)\n- Created momentum for long-term fitness success\n\nYou're crushing it! Enjoy your swim today, and remember - consistency is the real victory here. Well done!\n\n================================================================================", "day_of_week": "Fri", "date": "Feb14", "workout_type": "Pool Swimming"}, "6": {"filename": "Day_06_Sat_Feb15_Stretching_Mobility.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 1\n================================================================================\nDay 6 | Saturday, February 15 | Active Recovery & Stretching (with 10-min walk)\n================================================================================\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- This is an ACTIVE RECOVERY day - light stretching, mobility, and easy walking\n- No heavy lifting today; your body is in prime recovery mode\n- Rate of Perceived Exertion (RPE): 1-3 out of 10 (very gentle)\n- You're 6 days into Week 1 - almost done! Tomorrow is your final rest day.\n\n================================================================================\nMORNING ROUTINE (15 minutes total)\n================================================================================\n\nPART 1: Easy Walk (10 minutes)\nTake time to enjoy this. Walk outdoors if possible - the fresh air and sunlight are great for recovery.\n- Pace: Very easy conversational pace (RPE 2-3 out of 10)\n- Environment: Outdoors if weather permits (sunshine and fresh air boost mood and recovery)\n- Notes: No need to hurry. This is active recovery, not training. Just move gently.\n- Video: https://www.youtube.com/results?search_query=easy+walk+warm+up+exercise+beginners\n\nPART 2: Full Stretching Routine (After the walk)\nPerform all stretches from Day 2. Your muscles are warmed up from the walk, so stretches will feel better.\n\n1. Neck Lateral Stretch\n   Duration: 30 seconds each side (left, then right)\n   Notes: Gently tilt ear toward shoulder. Keep shoulders relaxed down.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n2. Neck Forward Flexion Stretch\n   Duration: 30 seconds\n   Notes: Slowly lower chin toward chest without forcing\n   Video: https://www.youtube.com/results?search_query=neck+forward+flexion+stretch+tutorial\n\n3. Upper Trap Stretch\n   Duration: 30 seconds each side\n   Notes: Reach right arm over head, gently pull head toward right shoulder. Feel stretch on left side of neck.\n   Video: https://www.youtube.com/results?search_query=upper+trapezius+stretch+form+tutorial\n\n4. Levator Scapulae Stretch\n   Duration: 30 seconds each side\n   Notes: Look toward floor at 45-degree angle, gently pull head forward and down. Feel stretch in upper trap.\n   Video: https://www.youtube.com/results?search_query=levator+scapulae+stretch+form+tutorial\n\n5. Chest Doorway Stretch\n   Duration: 30 seconds each side\n   Notes: Place forearm/palm on door frame, step through gently until you feel chest stretch.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n6. Cat-Cow Stretch\n   Reps: 10 repetitions (controlled, flowing movements)\n   Notes: On hands and knees. Arch back and lift gaze (cow), then round spine and tuck chin (cat).\n   Video: https://www.youtube.com/results?search_query=cat+cow+stretch+yoga+form+tutorial\n\n7. Thread the Needle (Thoracic Rotation)\n   Reps: 8 each side\n   Notes: On hands and knees, thread right arm under left side of body, rest on shoulder.\n   Video: https://www.youtube.com/results?search_query=thread+the+needle+stretch+thoracic+rotation+tutorial\n\n8. Hip Flexor Stretch (Half-Kneeling)\n   Duration: 30 seconds each side\n   Notes: Half-kneeling position, front knee bent at 90 degrees. Gently press hips forward.\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+half+kneeling+form+tutorial\n\n9. Standing Hamstring Stretch\n   Duration: 30 seconds each side\n   Notes: Place heel on bench or step (knee straight but not locked). Slight forward fold from hips.\n   Video: https://www.youtube.com/results?search_query=standing+hamstring+stretch+form+tutorial\n\n10. Figure-4 Glute Stretch (Supine)\n    Duration: 30 seconds each side\n    Notes: Lying on back, right ankle crosses over left knee. Pull left knee toward chest.\n    Video: https://www.youtube.com/results?search_query=figure+4+stretch+supine+form+tutorial\n\n11. Child's Pose\n    Duration: 60 seconds\n    Notes: On knees, drop hips back toward heels, arms extended forward. Rest your forehead.\n    Video: https://www.youtube.com/results?search_query=childs+pose+stretching+tutorial\n\n================================================================================\nEVENING ROUTINE (5-10 minutes)\n================================================================================\nLight mobility work to wind down and prepare for your final rest day tomorrow.\n\n1. Gentle Neck Circles\n   Reps: 5 each direction (forward, right, back, left - slowly!)\n   Notes: Slow, controlled movements. No force. This is very therapeutic.\n   Video: https://www.youtube.com/results?search_query=gentle+neck+circles+exercise+tutorial\n\n2. Shoulder Rolls\n   Reps: 10 forward, 10 backward\n   Notes: Slow, smooth movements. Feel your shoulders release tension.\n   Video: https://www.youtube.com/results?search_query=shoulder+rolls+exercise+form+tutorial\n\n3. World's Greatest Stretch\n   Reps: 5 each side\n   Notes: Lunge forward, rotate torso toward front leg, reach arm overhead. Full-body mobility.\n   Video: https://www.youtube.com/results?search_query=worlds+greatest+stretch+tutorial\n\n4. Pigeon Pose\n   Duration: 30 seconds each side\n   Notes: Right leg bent in front, left leg extended behind. Fold forward gently.\n   Video: https://www.youtube.com/results?search_query=pigeon+pose+yoga+stretch+tutorial\n\n5. Supine Spinal Twist\n   Duration: 30 seconds each side\n   Notes: Lying on back, right knee crosses toward left side, head turns right. Gentle twist.\n   Video: https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+tutorial\n\n================================================================================\nNOTES\n================================================================================\n\nYOU'RE ALMOST AT THE FINISH LINE!\n\nWEEK 1 RECAP:\nThis week you have completed:\n- Day 1 (Mon): Full body gym session (6 exercises)\n- Day 2 (Tue): Stretching & mobility focus\n- Day 3 (Wed): Kettlebell & bands home session (6 exercises)\n- Day 4 (Thu): Stretching & mobility with neck focus\n- Day 5 (Fri): Swimming and pool work (full-body, low-impact)\n- Day 6 (Sat): Active recovery with walking and stretching\n\nThat's an incredible start. You've proven to yourself that consistency is possible.\n\nWHY THIS RECOVERY FOCUS:\n- You've done 3 intense workouts (Mon, Wed, Fri)\n- 3 dedicated recovery days (Tue, Thu, Sat) maximize your adaptation\n- Your muscles grow and get stronger during recovery, not during the workout\n- Walking is an excellent active recovery tool - it aids circulation without stressing muscles\n- Stretching improves flexibility and mobility that you'll use next week\n\nTOMORROW (SUNDAY - DAY 7):\n- Full rest day\n- Very light activity only (gentle walk if desired)\n- Minimal stretching - just what feels good\n- This is when your body consolidates all the gains from Week 1\n\nSIGNS YOU'RE ADAPTING WELL:\n- Muscle soreness decreasing (if present)\n- Feeling stronger and more capable\n- Better sleep and recovery\n- Increased appetite (normal and expected)\n- Improved mobility and flexibility\n\nWHAT HAPPENS NEXT WEEK (Week 2):\n- You'll increase kettlebell weights slightly (20lb for some exercises)\n- Add more repetitions to some movements\n- Continue your 3-day-per-week schedule\n- Progressive overload keeps your body adapting and getting results\n\nNUTRITION REMINDER:\n- Eat 3-4g of protein per kg of body weight (so ~120-160g per day for you)\n- Stay hydrated - you're more active now than you were\n- Sleep 7-9 hours per night - this is when recovery happens\n- Don't cut calories too drastically - your body needs fuel to adapt to training\n\nFINAL THOUGHTS ON WEEK 1:\nYou came back from a sedentary lifestyle and completed a full week of consistent training. That's not easy, but you did it. Your neck received special attention with daily stretches. You used multiple modalities (gym, home, pool) to keep things interesting and work different aspects of fitness.\n\nYou're building a foundation that will carry you for years. Week 1 is complete. Rest well, recover fully, and come back fresh on Monday ready to build on this momentum.\n\nYou've got this!\n\n================================================================================", "day_of_week": "Sat", "date": "Feb15", "workout_type": "Stretching Mobility"}, "7": {"filename": "Day_07_Sun_Feb16_Rest.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 1\n================================================================================\nDay 7 | Sunday, February 16 | Full Rest Day\n================================================================================\n\nPROFILE REMINDER\n- Age: 47 | Weight: 100kg | Height: 1.82m | Experience: Returning to exercise\n- Goal: Build strength, lose fat, improve overall fitness\n- Today: FULL REST DAY - Your body does its most important work during rest\n- Rate of Perceived Exertion (RPE): 0-1 out of 10 (minimal, relaxing only)\n- Light activity is fine (gentle walk, stretching) but NO structured training\n\n================================================================================\nWHAT IS A FULL REST DAY?\n================================================================================\n\nA full rest day means:\n- NO strength training or intense cardio\n- Light activity only (walking is fine)\n- Stretching and mobility if it feels good\n- Focus on recovery: sleep, nutrition, hydration\n- Listen to your body - do only what feels restorative\n\nThis is when your muscles rebuild stronger, your CNS (central nervous system) recovers,\nand your body consolidates all the gains from the week.\n\n================================================================================\nOPTIONAL LIGHT ACTIVITY (Choose What Feels Good)\n================================================================================\n\nOPTION 1: Gentle Walk (If you want to move)\n- Duration: 10-20 minutes\n- Pace: Very easy, leisurely (RPE 1-2 out of 10)\n- Environment: Outdoors if possible for mental health benefits\n- No watch, no intensity - just enjoy being outside\n- Video: https://www.youtube.com/results?search_query=leisure+walk+slow+pace+exercise\n\nOPTION 2: Skip walking today\n- Rest completely if that's what your body needs\n- There's no penalty for complete inactivity on rest days\n- Listen to your body's signals\n\n================================================================================\nQUICK STRETCH ROUTINE (Only if it feels good - 5-10 minutes)\n================================================================================\n\nDo ONLY the stretches that feel restorative. This is not required, but many find\ngentle stretching helps with recovery and soreness.\n\n1. Neck Lateral Stretch\n   Duration: 30 seconds each side\n   Notes: Gentle, no force. Your neck worked hard this week.\n   Video: https://www.youtube.com/results?search_query=neck+lateral+stretch+form+tutorial\n\n2. Chest Doorway Stretch\n   Duration: 30 seconds each side\n   Notes: Great counterstretch to all the pulling and pushing you did this week.\n   Video: https://www.youtube.com/results?search_query=chest+doorway+stretch+form+tutorial\n\n3. Cat-Cow Stretch\n   Reps: 8 slow, controlled reps\n   Notes: Mobilizes entire spine. Very therapeutic.\n   Video: https://www.youtube.com/results?search_query=cat+cow+stretch+yoga+form+tutorial\n\n4. Hip Flexor Stretch (Half-Kneeling)\n   Duration: 30 seconds each side\n   Notes: Feel tight from sitting before fitness? This helps.\n   Video: https://www.youtube.com/results?search_query=hip+flexor+stretch+half+kneeling+form+tutorial\n\n5. Child's Pose\n   Duration: 60 seconds (or as long as feels good)\n   Notes: Full-body relaxation stretch. Great to end the week.\n   Video: https://www.youtube.com/results?search_query=childs+pose+stretching+tutorial\n\n================================================================================\nFOCUS ON RECOVERY TODAY\n================================================================================\n\nSLEEP:\n- Aim for 7-9 hours tonight\n- Quality sleep is when your muscles grow and adapt\n- Good sleep = better recovery = better results\n- Tip: Avoid screens 30-60 minutes before bed\n\nNUTRITION:\n- Eat well today - your body needs fuel to recover\n- Include protein at each meal (target ~120-160g for the day)\n- Don't cut calories - you're more active now and need to eat accordingly\n- Examples:\n  * Breakfast: Eggs, oatmeal, whole grain toast\n  * Lunch: Chicken/fish, rice, vegetables\n  * Dinner: Lean meat, sweet potato, vegetables\n  * Snacks: Greek yogurt, nuts, fruit, protein shake\n- Hydration: Drink plenty of water throughout the day\n\nSTRESS & MENTAL RECOVERY:\n- Your nervous system needs rest, not just your muscles\n- Avoid stressful situations if possible\n- Spend time with loved ones, enjoy hobbies\n- Relaxing activities: reading, meditation, light yoga\n- Video on meditation/mindfulness: https://www.youtube.com/results?search_query=beginner+meditation+relaxation+10+minutes\n\nMOBILITY & FLEXIBILITY GAINS:\n- Notice if you feel more flexible or mobile than last Sunday\n- Your range of motion has likely improved from all the stretching\n- This is one way to measure progress (beyond the scale or numbers)\n\n================================================================================\nWEEK 1 COMPLETE - REFLECTION\n================================================================================\n\nYOU DID IT! WEEK 1 IS FINISHED!\n\nWHAT YOU ACCOMPLISHED:\nWorkout Summary:\n- Monday: 6 gym exercises (squats, pulls, presses, rows, core)\n- Wednesday: 6 kettlebell/band exercises (swings, push-ups, rows, pull-aparts, deadlifts, core)\n- Friday: Swimming session (freestyle, breaststroke, intervals, treading water)\n- 3 Dedicated Recovery Days with stretching and mobility focus\n- Special attention to your neck (stiff from desk work) with daily targeted stretches\n\nPhysical Progress:\n- You handled 3 strength workouts after a sedentary period - that's huge\n- You swam laps comfortably (1500+ meters total)\n- You performed 60+ total reps of various exercises\n- You stretched and mobilized for 60+ total minutes\n- You walked and did light activity on recovery days\n\nMental Progress:\n- You proved you can be consistent (7 days, 3 workouts, 4 recovery days)\n- You showed up and did the work even though muscles might be sore\n- You learned about progressive overload, recovery, and balanced training\n- You demonstrated commitment to your goals\n\nWHAT YOU'VE SET UP FOR LONG-TERM SUCCESS:\n- A sustainable 3-day training schedule (Mon/Wed/Fri)\n- Recovery-focused rest days that maximize adaptation\n- Multiple training modalities (strength, cardio, mobility)\n- Specific attention to your injury concerns (neck)\n- Clear progressive overload path (weights and reps will increase)\n\nSIGNS OF ADAPTATION:\n- Possible mild muscle soreness now (normal and expected)\n- Increased appetite (your body is working harder)\n- Possibly better sleep quality\n- May notice improved mobility compared to Day 1\n- Feeling energized and capable\n\n================================================================================\nLOOKING AHEAD TO WEEK 2\n================================================================================\n\nWEEK 2 CHANGES (Progressive Overload):\n- Kettlebell weights: Increase select exercises from 15lb to 20lb\n- Repetitions: Add 1-2 reps to some exercises (bringing some from 10 to 12)\n- Intensity: Feel free to train at 7-8 out of 10 RPE (up from 6-7)\n- Same 3-day schedule: Mon gym, Wed kettlebell/bands, Fri swimming\n- Same recovery structure: 3 dedicated stretching/mobility days\n\nWHY PROGRESSIVE OVERLOAD WORKS:\n- Your body adapted to Week 1. Now it needs new stimulus\n- Small increases in weight or reps force your muscles to adapt further\n- This is how you build strength and muscle over time\n- Progression is slow and sustainable (key to long-term success)\n\nYOUR CHALLENGE FOR WEEK 2:\n- Match the consistency of Week 1\n- Increase kettlebell weight where indicated\n- Push a bit harder (7-8 RPE instead of 6-7)\n- Take the same care with form and recovery\n- Trust the process - adaptation takes time\n\n================================================================================\nFINAL NOTES\n================================================================================\n\nLISTEN TO YOUR BODY:\n- Some soreness is normal - that's DOMS (Delayed Onset Muscle Soreness)\n- Sharp pain is not normal - if you experience that, rest and consult a doctor\n- Neck discomfort specifically - the stretches should help, but stop if worse\n\nSCALE VS. MIRROR:\n- Your weight may increase slightly (muscle + water retention is normal)\n- Don't judge progress by scale alone\n- Look for: Strength increase, improved mobility, better posture, feel better\n- These are the real measures of success\n\nSTAY CONSISTENT:\n- Week 1 was about showing up and building the habit\n- Week 2+ is about maintaining that habit and progressing\n- Consistency for 8-12 weeks shows real, visible changes\n- You're building a lifestyle, not just doing a temporary program\n\nYOU'VE GOT A PLAN:\n- Week 1 is completely laid out and done\n- Week 2 starts Monday with progressive overload\n- You know the structure: Mon/Wed/Fri hard training, Tue/Thu/Sat recovery\n- Sundays are full rest days\n\nBELIEVE IN THE PROCESS:\n- You came back from sedentary to consistent training in one week\n- That's not small - that's an accomplishment\n- Your 47-year-old body is already adapting and getting stronger\n- In 4-6 weeks, you'll notice real changes in strength, endurance, and body composition\n\nEnjoy your rest day. You've earned it. See you Monday for Week 2!\n\n================================================================================", "day_of_week": "Sun", "date": "Feb16", "workout_type": "Rest"}}, "2": {"8": {"filename": "Day_08_Mon_Feb17_Full_Body_Gym.txt", "content": "================================================================================\n                    ALI'S WORKOUT PLAN - WEEK 2\n================================================================================\nDay 8 | Monday, February 17, 2026 | Full Body Gym Session\n================================================================================\n\nPROFILE REMINDER\n- Goal: Build strength, lose fat, improve overall fitness\n- Keep rest between sets: 60-90 seconds\n- Rate of Perceived Exertion (RPE): Aim for 6-7 out of 10\n- If any exercise causes pain (not just discomfort), STOP and skip it\n- Stay hydrated - drink water before, during, and after\n\nWEEK 2 PROGRESS NOTE\nGreat job finishing Week 1! This week we're building on that foundation by increasing\nto 3 sets for most movements and stepping up the kettlebell weight to 20lb where\nappropriate. You should feel stronger - trust the process!\n\n--------------------------------------------------------------------------------\nWARM-UP (5 minutes)\n--------------------------------------------------------------------------------\n1. Treadmill Walk\n   Duration: 3 minutes at easy pace (speed 2-3 mph)\n   Purpose: Get heart rate up, increase core body temperature\n   Video: https://www.youtube.com/results?search_query=treadmill+walking+form+tutorial\n\n2. Dynamic Stretches\n   - Arm Circles: 10 forward, 10 backward each arm\n     Video: https://www.youtube.com/results?search_query=arm+circles+dynamic+stretch+form\n\n   - Leg Swings: 10 each direction per leg\n     Video: https://www.youtube.com/results?search_query=leg+swings+dynamic+stretch+form\n\n   - Hip Circles: 10 circles each direction\n     Video: https://www.youtube.com/results?search_query=hip+circles+dynamic+warm+up+form\n\n--------------------------------------------------------------------------------\nMAIN WORKOUT\n--------------------------------------------------------------------------------\n\nExercise 1: Goblet Squat (Kettlebell)\n  Sets: 3 | Reps: 10 | Weight: 20lb\n  Rest: 60-90 seconds between sets\n  Form Cue: Hold kettlebell at chest, feet should
